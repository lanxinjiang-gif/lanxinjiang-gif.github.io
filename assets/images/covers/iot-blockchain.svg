<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="indigo6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="shadow6" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#4f46e5" flood-opacity="0.12"/>
    </filter>
    <filter id="glow6" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg6)" rx="12"/>
  <circle cx="150" cy="200" r="150" fill="#6366f1" opacity="0.025"/>
  <circle cx="450" cy="200" r="150" fill="#6366f1" opacity="0.025"/>

  <!-- LEFT SIDE: IoT Devices -->

  <!-- Device 1: Smartphone -->
  <g filter="url(#shadow6)" transform="translate(55, 60)">
    <rect width="50" height="80" rx="8" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect x="6" y="12" width="38" height="50" rx="2" fill="#e0e7ff"/>
    <!-- Signal bars -->
    <rect x="14" y="22" width="4" height="12" rx="2" fill="#6366f1" opacity="0.4"/>
    <rect x="21" y="18" width="4" height="16" rx="2" fill="#6366f1" opacity="0.6"/>
    <rect x="28" y="14" width="4" height="20" rx="2" fill="#6366f1" opacity="0.8"/>
    <!-- Home button -->
    <circle cx="25" cy="70" r="4" fill="#e0e7ff"/>
  </g>

  <!-- Device 2: Sensor/Chip -->
  <g filter="url(#shadow6)" transform="translate(40, 185)">
    <rect width="70" height="55" rx="6" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <!-- Chip -->
    <rect x="18" y="12" width="34" height="30" rx="4" fill="#6366f1" opacity="0.15"/>
    <rect x="24" y="18" width="22" height="18" rx="2" fill="url(#indigo6)" opacity="0.7"/>
    <!-- Pins -->
    <g stroke="#c7d2fe" stroke-width="2">
      <line x1="25" y1="8" x2="25" y2="12"/>
      <line x1="35" y1="8" x2="35" y2="12"/>
      <line x1="45" y1="8" x2="45" y2="12"/>
      <line x1="25" y1="42" x2="25" y2="47"/>
      <line x1="35" y1="42" x2="35" y2="47"/>
      <line x1="45" y1="42" x2="45" y2="47"/>
    </g>
    <!-- Dot in center -->
    <circle cx="35" cy="27" r="3" fill="#f59e0b"/>
  </g>

  <!-- Device 3: Laptop/Monitor -->
  <g filter="url(#shadow6)" transform="translate(45, 295)">
    <rect width="65" height="45" rx="4" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect x="5" y="5" width="55" height="30" rx="2" fill="#e0e7ff"/>
    <!-- Chart on screen -->
    <polyline points="10,28 20,20 30,25 40,15 50,18" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Base -->
    <rect x="20" y="45" width="25" height="5" rx="2" fill="#c7d2fe"/>
  </g>

  <!-- WiFi/signal rings from devices -->
  <g opacity="0.3">
    <path d="M115,95 C120,90 125,90 130,95" stroke="#6366f1" stroke-width="1.5" fill="none"/>
    <path d="M110,88 C118,80 132,80 140,88" stroke="#6366f1" stroke-width="1.2" fill="none"/>
    <path d="M120,210 C125,205 130,205 135,210" stroke="#6366f1" stroke-width="1.5" fill="none"/>
    <path d="M115,203 C123,195 137,195 145,203" stroke="#6366f1" stroke-width="1.2" fill="none"/>
    <path d="M118,315 C123,310 128,310 133,315" stroke="#6366f1" stroke-width="1.5" fill="none"/>
    <path d="M113,308 C121,300 135,300 143,308" stroke="#6366f1" stroke-width="1.2" fill="none"/>
  </g>

  <!-- CONNECTION LINES: IoT to central hub -->
  <g stroke="#93c5fd" stroke-width="2" fill="none" opacity="0.5">
    <path d="M115,100 C160,110 180,140 210,170" stroke-dasharray="6,4"/>
    <path d="M120,212 C160,210 180,200 210,195" stroke-dasharray="6,4"/>
    <path d="M118,315 C160,305 180,270 210,225" stroke-dasharray="6,4"/>
  </g>

  <!-- CENTRAL HUB: IoT Gateway -->
  <g transform="translate(230, 195)" filter="url(#glow6)">
    <circle r="30" fill="white" stroke="#4f46e5" stroke-width="2.5"/>
    <circle r="22" fill="#6366f1" opacity="0.1"/>
    <!-- Hub icon - connected dots -->
    <circle cx="0" cy="-8" r="4" fill="#4f46e5"/>
    <circle cx="-8" cy="6" r="4" fill="#4f46e5"/>
    <circle cx="8" cy="6" r="4" fill="#4f46e5"/>
    <line x1="0" y1="-8" x2="-8" y2="6" stroke="#4f46e5" stroke-width="1.5"/>
    <line x1="0" y1="-8" x2="8" y2="6" stroke="#4f46e5" stroke-width="1.5"/>
    <line x1="-8" y1="6" x2="8" y2="6" stroke="#4f46e5" stroke-width="1.5"/>
  </g>

  <!-- Arrow from hub to blockchain -->
  <g>
    <line x1="265" y1="195" x2="320" y2="195" stroke="#4f46e5" stroke-width="2.5" opacity="0.5"/>
    <polygon points="320,189 335,195 320,201" fill="#4f46e5" opacity="0.5"/>
    <!-- Data flow dots -->
    <circle cx="280" cy="195" r="2" fill="#f59e0b" opacity="0.7"/>
    <circle cx="295" cy="195" r="2" fill="#f59e0b" opacity="0.5"/>
    <circle cx="310" cy="195" r="2" fill="#f59e0b" opacity="0.3"/>
  </g>

  <!-- RIGHT SIDE: Blockchain blocks (vertical chain) -->

  <!-- Block 1 -->
  <g filter="url(#shadow6)" transform="translate(340, 50)">
    <rect width="100" height="70" rx="10" fill="url(#indigo6)"/>
    <rect x="14" y="14" width="72" height="5" rx="2.5" fill="#fff" opacity="0.3"/>
    <rect x="14" y="26" width="50" height="5" rx="2.5" fill="#fff" opacity="0.25"/>
    <rect x="14" y="38" width="62" height="5" rx="2.5" fill="#fff" opacity="0.2"/>
    <rect x="14" y="52" width="72" height="4" rx="2" fill="#818cf8" opacity="0.5"/>
  </g>

  <!-- Chain link 1-2 -->
  <line x1="390" y1="120" x2="390" y2="145" stroke="#4f46e5" stroke-width="3" stroke-linecap="round"/>
  <circle cx="390" cy="128" r="3" fill="#6366f1"/>
  <circle cx="390" cy="137" r="3" fill="#6366f1"/>

  <!-- Block 2 (main, highlighted) -->
  <g filter="url(#shadow6)" transform="translate(335, 145)">
    <rect width="110" height="80" rx="12" fill="url(#indigo6)" stroke="#f59e0b" stroke-width="2"/>
    <rect x="15" y="15" width="80" height="5" rx="2.5" fill="#fff" opacity="0.3"/>
    <rect x="15" y="27" width="55" height="5" rx="2.5" fill="#fff" opacity="0.25"/>
    <rect x="15" y="39" width="68" height="5" rx="2.5" fill="#fff" opacity="0.2"/>
    <!-- Smart contract indicator -->
    <rect x="15" y="52" width="80" height="16" rx="4" fill="#f59e0b" opacity="0.4"/>
    <text x="55" y="64" text-anchor="middle" font-family="monospace" font-size="8" fill="#fff" opacity="0.9">{ }</text>
  </g>

  <!-- Chain link 2-3 -->
  <line x1="390" y1="225" x2="390" y2="250" stroke="#4f46e5" stroke-width="3" stroke-linecap="round"/>
  <circle cx="390" cy="233" r="3" fill="#6366f1"/>
  <circle cx="390" cy="242" r="3" fill="#6366f1"/>

  <!-- Block 3 -->
  <g filter="url(#shadow6)" transform="translate(340, 250)">
    <rect width="100" height="70" rx="10" fill="url(#indigo6)"/>
    <rect x="14" y="14" width="72" height="5" rx="2.5" fill="#fff" opacity="0.3"/>
    <rect x="14" y="26" width="50" height="5" rx="2.5" fill="#fff" opacity="0.25"/>
    <rect x="14" y="38" width="62" height="5" rx="2.5" fill="#fff" opacity="0.2"/>
    <rect x="14" y="52" width="72" height="4" rx="2" fill="#818cf8" opacity="0.5"/>
  </g>

  <!-- P2P Lending icon (right side) -->
  <g transform="translate(510, 130)" filter="url(#shadow6)">
    <circle r="28" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <!-- Person A -->
    <circle cx="-10" cy="-6" r="5" fill="#6366f1" opacity="0.7"/>
    <path d="M-18,6 C-18,0 -10,-3 -10,-3 C-10,-3 -2,0 -2,6" fill="#6366f1" opacity="0.5"/>
    <!-- Person B -->
    <circle cx="10" cy="-6" r="5" fill="#f59e0b" opacity="0.7"/>
    <path d="M2,6 C2,0 10,-3 10,-3 C10,-3 18,0 18,6" fill="#f59e0b" opacity="0.5"/>
    <!-- Double arrow between -->
    <line x1="-3" y1="12" x2="3" y2="12" stroke="#4f46e5" stroke-width="1.5"/>
  </g>

  <!-- Connection from blockchain to P2P -->
  <path d="M445,170 C465,155 480,140 485,135" stroke="#93c5fd" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Currency/coin icon -->
  <g transform="translate(520, 260)" filter="url(#glow6)">
    <circle r="22" fill="url(#amberGrad)" opacity="0.85"/>
    <circle r="16" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#fff" font-weight="bold">$</text>
  </g>

  <!-- Connection from blockchain to currency -->
  <path d="M440,290 C465,285 485,275 500,265" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Floating particles -->
  <circle cx="180" cy="40" r="3" fill="#93c5fd" opacity="0.5"/>
  <circle cx="280" cy="60" r="2" fill="#6366f1" opacity="0.3"/>
  <circle cx="560" cy="50" r="3" fill="#c7d2fe" opacity="0.4"/>
  <circle cx="170" cy="360" r="2" fill="#93c5fd" opacity="0.4"/>
  <circle cx="560" cy="360" r="3" fill="#c7d2fe" opacity="0.5"/>
  <circle cx="300" cy="370" r="2" fill="#6366f1" opacity="0.3"/>
</svg>