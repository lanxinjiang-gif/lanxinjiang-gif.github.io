<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="blockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Title -->
  <text x="300" y="38" font-family="Arial, sans-serif" font-size="15" fill="#312e81" text-anchor="middle" font-weight="bold">IoT + Blockchain Smart Contracts in P2P Lending</text>
  <text x="300" y="56" font-family="Arial, sans-serif" font-size="11" fill="#6366f1" text-anchor="middle">Borrower ↔ Lender connected via IoT Monitoring + Blockchain Automation</text>

  <!-- LEFT: Borrower figure -->
  <g transform="translate(70, 100)">
    <!-- Person icon -->
    <circle cx="0" cy="0" r="20" fill="#dbeafe" stroke="#6366f1" stroke-width="2"/>
    <circle cx="0" cy="-5" r="7" fill="#6366f1"/>
    <path d="M-12,10 C-12,2 12,2 12,10" fill="#6366f1"/>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" fill="#4f46e5" text-anchor="middle" font-weight="bold">Borrower</text>
  </g>

  <!-- RIGHT: Lender figure -->
  <g transform="translate(530, 100)">
    <circle cx="0" cy="0" r="20" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <circle cx="0" cy="-5" r="7" fill="#22c55e"/>
    <path d="M-12,10 C-12,2 12,2 12,10" fill="#22c55e"/>
    <text x="0" y="35" font-family="Arial, sans-serif" font-size="10" fill="#16a34a" text-anchor="middle" font-weight="bold">Lender</text>
  </g>

  <!-- Loan connection line (top) -->
  <line x1="100" y1="95" x2="500" y2="95" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="8,4"/>
  <rect x="240" y="80" width="120" height="28" rx="6" fill="#dbeafe" stroke="#6366f1" stroke-width="1.5"/>
  <text x="300" y="93" font-family="Arial, sans-serif" font-size="8" fill="#4f46e5" text-anchor="middle" font-weight="bold">P2P LOAN</text>
  <text x="300" y="103" font-family="Arial, sans-serif" font-size="7" fill="#6366f1" text-anchor="middle">$$$</text>
  <!-- Arrow heads -->
  <polygon points="105,90 95,95 105,100" fill="#93c5fd"/>
  <polygon points="495,90 505,95 495,100" fill="#93c5fd"/>

  <!-- IoT Sensors (around borrower) -->
  <g transform="translate(30, 200)">
    <rect x="0" y="0" width="160" height="140" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.2"/>
    <text x="80" y="18" font-family="Arial, sans-serif" font-size="9" fill="#4f46e5" text-anchor="middle" font-weight="bold">IoT Sensors</text>

    <!-- Smartphone -->
    <rect x="12" y="28" width="28" height="45" rx="4" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="15" y="34" width="22" height="28" rx="1" fill="#dbeafe"/>
    <circle cx="26" cy="67" r="2.5" fill="#6366f1"/>
    <text x="26" y="82" font-family="Arial, sans-serif" font-size="6.5" fill="#6366f1" text-anchor="middle">Phone</text>

    <!-- GPS/location device -->
    <g transform="translate(65, 28)">
      <circle cx="15" cy="15" r="14" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
      <circle cx="15" cy="12" r="4" fill="#6366f1"/>
      <path d="M15,16 L15,24" stroke="#6366f1" stroke-width="1.5"/>
      <circle cx="15" cy="12" r="8" fill="none" stroke="#93c5fd" stroke-width="1" stroke-dasharray="2,2"/>
      <text x="15" y="40" font-family="Arial, sans-serif" font-size="6.5" fill="#6366f1" text-anchor="middle">GPS</text>
    </g>

    <!-- Wearable/sensor -->
    <g transform="translate(110, 28)">
      <rect x="0" y="5" width="32" height="22" rx="6" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
      <rect x="4" y="9" width="24" height="14" rx="3" fill="#dbeafe"/>
      <!-- Signal waves -->
      <path d="M12,14 L16,10 L20,18 L24,12" fill="none" stroke="#6366f1" stroke-width="1.2"/>
      <text x="16" y="40" font-family="Arial, sans-serif" font-size="6.5" fill="#6366f1" text-anchor="middle">Wearable</text>
    </g>

    <!-- Data streams going right -->
    <text x="80" y="100" font-family="Arial, sans-serif" font-size="7" fill="#93c5fd" text-anchor="middle">spending, location,</text>
    <text x="80" y="112" font-family="Arial, sans-serif" font-size="7" fill="#93c5fd" text-anchor="middle">behavior, activity</text>

    <!-- Signal waves -->
    <circle cx="145" cy="55" r="3" fill="none" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
    <circle cx="145" cy="55" r="8" fill="none" stroke="#6366f1" stroke-width="0.8" opacity="0.3"/>
    <circle cx="145" cy="55" r="13" fill="none" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>
  </g>

  <!-- Arrow: IoT to Smart Contract -->
  <line x1="195" y1="270" x2="228" y2="270" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="228,265 240,270 228,275" fill="#6366f1"/>
  <text x="215" y="260" font-family="Arial, sans-serif" font-size="7" fill="#6366f1" text-anchor="middle">data feed</text>

  <!-- CENTER: Blockchain Smart Contract -->
  <g transform="translate(242, 170)">
    <rect x="0" y="0" width="150" height="170" rx="10" fill="#ffffff" stroke="#4f46e5" stroke-width="2"/>

    <!-- Blockchain header -->
    <rect x="0" y="0" width="150" height="30" rx="10" fill="url(#blockGrad)"/>
    <rect x="0" y="15" width="150" height="15" fill="url(#blockGrad)"/>
    <text x="75" y="20" font-family="Arial, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="bold">BLOCKCHAIN</text>

    <!-- Smart contract visual -->
    <rect x="15" y="38" width="120" height="60" rx="5" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1"/>
    <text x="75" y="53" font-family="Arial, sans-serif" font-size="8" fill="#4f46e5" text-anchor="middle" font-weight="bold">Smart Contract</text>
    <!-- Code-like lines -->
    <text x="25" y="67" font-family="monospace" font-size="6" fill="#6366f1">if risk_score > 0.7:</text>
    <text x="30" y="77" font-family="monospace" font-size="6" fill="#6366f1">  adjust_terms()</text>
    <text x="25" y="87" font-family="monospace" font-size="6" fill="#6366f1">elif default_prob:</text>
    <text x="30" y="93" font-family="monospace" font-size="6" fill="#6366f1">  alert_lender()</text>

    <!-- Chain blocks at bottom -->
    <rect x="10" y="108" width="38" height="22" rx="3" fill="#4f46e5"/>
    <text x="29" y="122" font-family="monospace" font-size="6" fill="#ffffff" text-anchor="middle">#a3f</text>
    <line x1="48" y1="119" x2="56" y2="119" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="56" y="108" width="38" height="22" rx="3" fill="#4f46e5"/>
    <text x="75" y="122" font-family="monospace" font-size="6" fill="#ffffff" text-anchor="middle">#b7c</text>
    <line x1="94" y1="119" x2="102" y2="119" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="102" y="108" width="38" height="22" rx="3" fill="#4f46e5"/>
    <text x="121" y="122" font-family="monospace" font-size="6" fill="#ffffff" text-anchor="middle">#d1e</text>

    <!-- Risk output -->
    <rect x="25" y="138" width="100" height="24" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="75" y="150" font-family="Arial, sans-serif" font-size="7" fill="#92400e" text-anchor="middle" font-weight="bold">Risk Score: 0.42</text>
    <text x="75" y="159" font-family="Arial, sans-serif" font-size="6" fill="#f59e0b" text-anchor="middle">AUTO-EVALUATED</text>
  </g>

  <!-- Arrow: Smart Contract to Lender -->
  <line x1="395" y1="270" x2="428" y2="270" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="428,265 440,270 428,275" fill="#6366f1"/>
  <text x="415" y="260" font-family="Arial, sans-serif" font-size="7" fill="#6366f1" text-anchor="middle">updates</text>

  <!-- RIGHT: Risk Dashboard for Lender -->
  <g transform="translate(442, 190)">
    <rect x="0" y="0" width="135" height="140" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.2"/>
    <text x="67" y="18" font-family="Arial, sans-serif" font-size="9" fill="#16a34a" text-anchor="middle" font-weight="bold">Lender Dashboard</text>

    <!-- Risk gauge -->
    <g transform="translate(67, 55)">
      <path d="M-30,0 A30,30 0 0,1 30,0" fill="none" stroke="#e2e8f0" stroke-width="6"/>
      <path d="M-30,0 A30,30 0 0,1 0,-30" fill="none" stroke="#22c55e" stroke-width="6"/>
      <text x="0" y="-8" font-family="Arial, sans-serif" font-size="12" fill="#16a34a" text-anchor="middle" font-weight="bold">LOW</text>
      <text x="0" y="5" font-family="Arial, sans-serif" font-size="7" fill="#6b7280" text-anchor="middle">risk level</text>
    </g>

    <!-- Status items -->
    <rect x="10" y="82" width="115" height="18" rx="3" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
    <circle cx="22" cy="91" r="4" fill="#22c55e"/>
    <text x="32" y="94" font-family="Arial, sans-serif" font-size="7" fill="#166534">Payment: On Track</text>

    <rect x="10" y="104" width="115" height="18" rx="3" fill="#dcfce7" stroke="#86efac" stroke-width="0.8"/>
    <circle cx="22" cy="113" r="4" fill="#22c55e"/>
    <text x="32" y="116" font-family="Arial, sans-serif" font-size="7" fill="#166534">Behavior: Stable</text>
  </g>

  <!-- Bottom labels -->
  <text x="300" y="370" font-family="Arial, sans-serif" font-size="10" fill="#4f46e5" text-anchor="middle" font-weight="600">Continuous IoT monitoring feeds blockchain smart contracts</text>
  <text x="300" y="388" font-family="Arial, sans-serif" font-size="9" fill="#93c5fd" text-anchor="middle">Automated real-time risk assessment for peer-to-peer lending</text>

  <circle cx="15" cy="385" r="3" fill="#dbeafe" opacity="0.5"/>
  <circle cx="585" cy="15" r="3" fill="#dbeafe" opacity="0.5"/>
</svg>