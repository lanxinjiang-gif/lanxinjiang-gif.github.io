<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 300" width="440" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ecfeff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3730a3;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="440" height="300" fill="url(#bgGrad)" rx="8"/>

  <!-- Subtle grid -->
  <g opacity="0.06">
    <line x1="0" y1="60" x2="440" y2="60" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="440" y2="120" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="440" y2="180" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="440" y2="240" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="110" y1="0" x2="110" y2="300" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="220" y1="0" x2="220" y2="300" stroke="#94a3b8" stroke-width="0.5"/>
    <line x1="330" y1="0" x2="330" y2="300" stroke="#94a3b8" stroke-width="0.5"/>
  </g>

  <!-- === IoT Devices (left side) === -->
  <!-- Phone device -->
  <g filter="url(#softShadow)">
    <rect x="30" y="50" width="30" height="50" rx="5" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
    <rect x="36" y="58" width="18" height="28" rx="2" fill="#cffafe"/>
    <circle cx="45" cy="92" r="2.5" fill="#0891b2"/>
  </g>

  <!-- Sensor node 1 -->
  <g filter="url(#softShadow)">
    <circle cx="55" cy="145" r="18" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
    <circle cx="55" cy="145" r="8" fill="#0891b2" opacity="0.3"/>
    <circle cx="55" cy="145" r="4" fill="#0891b2"/>
  </g>

  <!-- Signal waves from sensor -->
  <path d="M73 139 Q80 135 78 129" fill="none" stroke="#0891b2" stroke-width="1.2" opacity="0.5"/>
  <path d="M75 143 Q84 138 82 130" fill="none" stroke="#0891b2" stroke-width="1" opacity="0.35"/>
  <path d="M77 147 Q88 141 86 131" fill="none" stroke="#0891b2" stroke-width="0.8" opacity="0.2"/>

  <!-- Sensor node 2 -->
  <g filter="url(#softShadow)">
    <rect x="25" y="195" width="36" height="36" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="1.5"/>
    <path d="M43 206 L43 210 L38 220 L48 220 L43 210" fill="#0891b2" opacity="0.6"/>
    <circle cx="43" cy="222" r="3" fill="#0891b2"/>
  </g>

  <!-- WiFi icon -->
  <g transform="translate(65, 60)" opacity="0.5">
    <path d="M0 12 Q8 0 16 12" fill="none" stroke="#0891b2" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M3 9 Q8 2 13 9" fill="none" stroke="#0891b2" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M6 6 Q8 3.5 10 6" fill="none" stroke="#0891b2" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- === Data streams flowing to blockchain === -->
  <g opacity="0.6">
    <path d="M80 75 Q120 85 150 115" fill="none" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="4 3"/>
    <path d="M80 145 Q120 142 150 138" fill="none" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="4 3"/>
    <path d="M75 210 Q120 200 150 165" fill="none" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="4 3"/>
  </g>

  <!-- Data particles -->
  <circle cx="100" cy="82" r="2" fill="#0891b2" opacity="0.7"/>
  <circle cx="118" cy="92" r="1.5" fill="#0891b2" opacity="0.5"/>
  <circle cx="108" cy="143" r="2" fill="#0891b2" opacity="0.7"/>
  <circle cx="128" cy="140" r="1.5" fill="#0891b2" opacity="0.5"/>
  <circle cx="100" cy="205" r="2" fill="#0891b2" opacity="0.7"/>
  <circle cx="122" cy="190" r="1.5" fill="#0891b2" opacity="0.5"/>

  <!-- === Blockchain (center) === -->
  <!-- Block 1 -->
  <g filter="url(#softShadow)">
    <rect x="155" y="105" width="48" height="38" rx="6" fill="url(#blockGrad)"/>
    <rect x="163" y="112" width="16" height="2.5" rx="1" fill="#a5b4fc" opacity="0.6"/>
    <rect x="163" y="117" width="12" height="2.5" rx="1" fill="#a5b4fc" opacity="0.4"/>
    <rect x="163" y="122" width="20" height="2.5" rx="1" fill="#a5b4fc" opacity="0.3"/>
    <rect x="163" y="127" width="8" height="2.5" rx="1" fill="#a5b4fc" opacity="0.2"/>
  </g>

  <!-- Chain link 1-2 -->
  <line x1="203" y1="124" x2="218" y2="138" stroke="#4f46e5" stroke-width="2.5" opacity="0.6"/>
  <circle cx="210" cy="131" r="3" fill="#818cf8" opacity="0.5"/>

  <!-- Block 2 (smart contract - glowing) -->
  <g filter="url(#glow)">
    <rect x="220" y="125" width="52" height="42" rx="6" fill="url(#blockGrad)"/>
    <rect x="232" y="132" width="26" height="18" rx="3" fill="#eef2ff" opacity="0.2"/>
    <path d="M238 137 L242 141 L252 133" fill="none" stroke="#a5b4fc" stroke-width="1.8" stroke-linecap="round"/>
    <rect x="238" y="145" width="14" height="2" rx="1" fill="#a5b4fc" opacity="0.5"/>
    <rect x="238" y="149" width="10" height="2" rx="1" fill="#a5b4fc" opacity="0.3"/>
    <rect x="217" y="122" width="58" height="48" rx="8" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Chain link 2-3 -->
  <line x1="272" y1="146" x2="288" y2="132" stroke="#4f46e5" stroke-width="2.5" opacity="0.6"/>
  <circle cx="280" cy="139" r="3" fill="#818cf8" opacity="0.5"/>

  <!-- Block 3 -->
  <g filter="url(#softShadow)">
    <rect x="290" y="108" width="48" height="38" rx="6" fill="url(#blockGrad)"/>
    <rect x="298" y="115" width="16" height="2.5" rx="1" fill="#a5b4fc" opacity="0.6"/>
    <rect x="298" y="120" width="12" height="2.5" rx="1" fill="#a5b4fc" opacity="0.4"/>
    <rect x="298" y="125" width="20" height="2.5" rx="1" fill="#a5b4fc" opacity="0.3"/>
    <rect x="298" y="130" width="8" height="2.5" rx="1" fill="#a5b4fc" opacity="0.2"/>
  </g>

  <!-- === P2P Lending (right side) === -->
  <!-- Arrows from blockchain -->
  <path d="M338 120 Q352 115 365 85" fill="none" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.4"/>
  <path d="M338 132 Q352 145 370 185" fill="none" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.4"/>

  <!-- Person A (lender) -->
  <g filter="url(#softShadow)">
    <circle cx="385" cy="70" r="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="385" cy="65" r="5.5" fill="#f59e0b" opacity="0.5"/>
    <path d="M376 78 Q385 85 394 78" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  </g>

  <!-- Person B (borrower) -->
  <g filter="url(#softShadow)">
    <circle cx="385" cy="200" r="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="385" cy="195" r="5.5" fill="#f59e0b" opacity="0.5"/>
    <path d="M376 208 Q385 215 394 208" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  </g>

  <!-- P2P connection -->
  <line x1="385" y1="88" x2="385" y2="182" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5 4" opacity="0.4"/>
  <polygon points="381,174 385,183 389,174" fill="#f59e0b" opacity="0.5"/>

  <!-- Coin symbols -->
  <circle cx="385" cy="118" r="7" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <circle cx="385" cy="150" r="7" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>

  <!-- === Risk Gauge (bottom right) === -->
  <g transform="translate(385, 248)">
    <path d="M-24 0 A24 24 0 0 1 24 0" fill="none" stroke="#e2e8f0" stroke-width="5" stroke-linecap="round"/>
    <path d="M-24 0 A24 24 0 0 1 -12 -20.8" fill="none" stroke="#10b981" stroke-width="5" stroke-linecap="round"/>
    <path d="M-12 -20.8 A24 24 0 0 1 12 -20.8" fill="none" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
    <path d="M12 -20.8 A24 24 0 0 1 24 0" fill="none" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-3" y2="-19" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="3" fill="#1e293b"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="130" cy="50" r="2" fill="#0891b2" opacity="0.12"/>
  <circle cx="320" cy="55" r="2" fill="#4f46e5" opacity="0.12"/>
  <circle cx="420" cy="260" r="2" fill="#f59e0b" opacity="0.12"/>
  <circle cx="160" cy="260" r="2" fill="#4f46e5" opacity="0.08"/>

  <!-- IoT label area -->
  <rect x="20" y="258" width="60" height="22" rx="6" fill="#ecfeff" stroke="#0891b2" stroke-width="1" opacity="0.4"/>
  <circle cx="34" cy="269" r="3" fill="#0891b2" opacity="0.5"/>
  <rect x="41" y="267" width="28" height="3" rx="1" fill="#0891b2" opacity="0.25"/>

  <!-- Blockchain label area -->
  <rect x="200" y="188" width="68" height="20" rx="6" fill="#eef2ff" stroke="#4f46e5" stroke-width="1" opacity="0.4"/>
  <rect x="210" y="195" width="20" height="2.5" rx="1" fill="#4f46e5" opacity="0.25"/>
  <rect x="234" y="195" width="24" height="2.5" rx="1" fill="#4f46e5" opacity="0.18"/>
</svg>
