<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="chainGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Title -->
  <text x="300" y="38" font-family="Arial, sans-serif" font-size="15" fill="#312e81" text-anchor="middle" font-weight="bold">Combating Greenwashing with Blockchain</text>
  <text x="300" y="56" font-family="Arial, sans-serif" font-size="11" fill="#6366f1" text-anchor="middle">Environmental Claims → Blockchain Audit → Truth Revealed</text>

  <!-- LEFT: ESG Report with green claims -->
  <rect x="30" y="80" width="145" height="195" rx="6" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
  <rect x="30" y="80" width="145" height="32" rx="6" fill="#dcfce7"/>
  <rect x="30" y="106" width="145" height="0" fill="#dcfce7"/>
  <text x="102" y="101" font-family="Arial, sans-serif" font-size="10" fill="#16a34a" text-anchor="middle" font-weight="bold">ESG Report</text>
  <!-- Leaf icon -->
  <ellipse cx="60" cy="96" rx="8" ry="5" fill="#22c55e" transform="rotate(-30 60 96)" opacity="0.6"/>

  <!-- Claims list -->
  <g transform="translate(42, 125)">
    <!-- Claim 1 -->
    <rect x="0" y="0" width="120" height="22" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <ellipse cx="12" cy="11" rx="5" ry="3.5" fill="#22c55e" transform="rotate(-20 12 11)" opacity="0.5"/>
    <text x="22" y="15" font-family="Arial, sans-serif" font-size="8" fill="#166534">Carbon Neutral</text>
    <!-- Claim 2 -->
    <rect x="0" y="28" width="120" height="22" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <ellipse cx="12" cy="39" rx="5" ry="3.5" fill="#22c55e" transform="rotate(-20 12 39)" opacity="0.5"/>
    <text x="22" y="43" font-family="Arial, sans-serif" font-size="8" fill="#166534">100% Renewable</text>
    <!-- Claim 3 -->
    <rect x="0" y="56" width="120" height="22" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <ellipse cx="12" cy="67" rx="5" ry="3.5" fill="#22c55e" transform="rotate(-20 12 67)" opacity="0.5"/>
    <text x="22" y="71" font-family="Arial, sans-serif" font-size="8" fill="#166534">Zero Waste</text>
    <!-- Claim 4 -->
    <rect x="0" y="84" width="120" height="22" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <ellipse cx="12" cy="95" rx="5" ry="3.5" fill="#22c55e" transform="rotate(-20 12 95)" opacity="0.5"/>
    <text x="22" y="99" font-family="Arial, sans-serif" font-size="8" fill="#166534">Eco-Certified</text>
    <!-- Claim 5 -->
    <rect x="0" y="112" width="120" height="22" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
    <ellipse cx="12" cy="123" rx="5" ry="3.5" fill="#22c55e" transform="rotate(-20 12 123)" opacity="0.5"/>
    <text x="22" y="127" font-family="Arial, sans-serif" font-size="8" fill="#166534">Sustainable Supply</text>
  </g>
  <text x="102" y="296" font-family="Arial, sans-serif" font-size="9" fill="#16a34a" text-anchor="middle" font-weight="600">Company Claims</text>

  <!-- Arrow: Report to Blockchain -->
  <line x1="182" y1="175" x2="220" y2="175" stroke="#6366f1" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="220,170 232,175 220,180" fill="#6366f1"/>

  <!-- CENTER: Blockchain verification -->
  <g transform="translate(235, 95)">
    <!-- Chain of blocks -->
    <rect x="0" y="0" width="130" height="195" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="65" y="22" font-family="Arial, sans-serif" font-size="10" fill="#4f46e5" text-anchor="middle" font-weight="bold">Blockchain</text>
    <text x="65" y="35" font-family="Arial, sans-serif" font-size="8" fill="#6366f1" text-anchor="middle">Verification</text>

    <!-- Block 1 -->
    <rect x="15" y="45" width="100" height="28" rx="4" fill="#4f46e5"/>
    <text x="65" y="58" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle">Block #4a2f...</text>
    <text x="65" y="68" font-family="monospace" font-size="6" fill="#c7d2fe" text-anchor="middle">verify: carbon data</text>
    <!-- Chain link -->
    <line x1="65" y1="73" x2="65" y2="83" stroke="#6366f1" stroke-width="2"/>
    <circle cx="65" cy="78" r="2" fill="#6366f1"/>

    <!-- Block 2 -->
    <rect x="15" y="83" width="100" height="28" rx="4" fill="#4f46e5"/>
    <text x="65" y="96" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle">Block #7b1e...</text>
    <text x="65" y="106" font-family="monospace" font-size="6" fill="#c7d2fe" text-anchor="middle">verify: energy src</text>
    <!-- Chain link -->
    <line x1="65" y1="111" x2="65" y2="121" stroke="#6366f1" stroke-width="2"/>
    <circle cx="65" cy="116" r="2" fill="#6366f1"/>

    <!-- Block 3 -->
    <rect x="15" y="121" width="100" height="28" rx="4" fill="#4f46e5"/>
    <text x="65" y="134" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle">Block #c9d3...</text>
    <text x="65" y="144" font-family="monospace" font-size="6" fill="#c7d2fe" text-anchor="middle">verify: waste mgt</text>
    <!-- Chain link -->
    <line x1="65" y1="149" x2="65" y2="159" stroke="#6366f1" stroke-width="2"/>
    <circle cx="65" cy="154" r="2" fill="#6366f1"/>

    <!-- Block 4 -->
    <rect x="15" y="159" width="100" height="28" rx="4" fill="#4f46e5"/>
    <text x="65" y="172" font-family="monospace" font-size="7" fill="#ffffff" text-anchor="middle">Block #e5f1...</text>
    <text x="65" y="182" font-family="monospace" font-size="6" fill="#c7d2fe" text-anchor="middle">smart contract audit</text>
  </g>
  <text x="300" y="310" font-family="Arial, sans-serif" font-size="9" fill="#4f46e5" text-anchor="middle" font-weight="600">Smart Contract</text>
  <text x="300" y="323" font-family="Arial, sans-serif" font-size="9" fill="#4f46e5" text-anchor="middle" font-weight="600">Audit Trail</text>

  <!-- Arrow: Blockchain to Results -->
  <line x1="372" y1="175" x2="410" y2="175" stroke="#6366f1" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="410,170 422,175 410,180" fill="#6366f1"/>

  <!-- RIGHT: Verification Results -->
  <g transform="translate(425, 90)">
    <rect x="0" y="0" width="150" height="210" rx="8" fill="#ffffff" stroke="#e0e7ff" stroke-width="1.5"/>
    <text x="75" y="22" font-family="Arial, sans-serif" font-size="10" fill="#312e81" text-anchor="middle" font-weight="bold">Results</text>

    <!-- Verified claims (green checks) -->
    <rect x="12" y="35" width="126" height="28" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.2"/>
    <circle cx="30" cy="49" r="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
    <polyline points="26,49 29,53 35,45" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="45" y="47" font-family="Arial, sans-serif" font-size="7.5" fill="#166534">Carbon Neutral</text>
    <text x="45" y="56" font-family="Arial, sans-serif" font-size="6" fill="#22c55e">VERIFIED</text>

    <rect x="12" y="68" width="126" height="28" rx="4" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.2"/>
    <circle cx="30" cy="82" r="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
    <polyline points="26,82 29,86 35,78" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="45" y="80" font-family="Arial, sans-serif" font-size="7.5" fill="#166534">Eco-Certified</text>
    <text x="45" y="89" font-family="Arial, sans-serif" font-size="6" fill="#22c55e">VERIFIED</text>

    <!-- Failed claims (red X - greenwashing detected) -->
    <rect x="12" y="106" width="126" height="28" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
    <circle cx="30" cy="120" r="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
    <line x1="26" y1="116" x2="34" y2="124" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    <line x1="34" y1="116" x2="26" y2="124" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    <text x="45" y="118" font-family="Arial, sans-serif" font-size="7.5" fill="#991b1b">100% Renewable</text>
    <text x="45" y="127" font-family="Arial, sans-serif" font-size="6" fill="#ef4444">GREENWASHING</text>

    <rect x="12" y="139" width="126" height="28" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
    <circle cx="30" cy="153" r="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
    <line x1="26" y1="149" x2="34" y2="157" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    <line x1="34" y1="149" x2="26" y2="157" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    <text x="45" y="151" font-family="Arial, sans-serif" font-size="7.5" fill="#991b1b">Zero Waste</text>
    <text x="45" y="160" font-family="Arial, sans-serif" font-size="6" fill="#ef4444">GREENWASHING</text>

    <!-- Pending -->
    <rect x="12" y="172" width="126" height="28" rx="4" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
    <circle cx="30" cy="186" r="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="30" y="190" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle" font-weight="bold">?</text>
    <text x="45" y="184" font-family="Arial, sans-serif" font-size="7.5" fill="#92400e">Sustainable Supply</text>
    <text x="45" y="193" font-family="Arial, sans-serif" font-size="6" fill="#f59e0b">PENDING REVIEW</text>
  </g>
  <text x="500" y="320" font-family="Arial, sans-serif" font-size="9" fill="#312e81" text-anchor="middle" font-weight="600">Truth Revealed</text>

  <!-- Bottom summary -->
  <text x="300" y="360" font-family="Arial, sans-serif" font-size="10" fill="#4f46e5" text-anchor="middle" font-weight="600">Immutable blockchain records expose false environmental claims</text>
  <text x="300" y="378" font-family="Arial, sans-serif" font-size="9" fill="#93c5fd" text-anchor="middle">Smart contracts automate verification of ESG disclosures</text>

  <!-- Decorative -->
  <circle cx="15" cy="385" r="3" fill="#dbeafe" opacity="0.5"/>
  <circle cx="585" cy="15" r="3" fill="#dbeafe" opacity="0.5"/>
</svg>