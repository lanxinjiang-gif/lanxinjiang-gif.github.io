<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 300" width="440" height="300">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f4ff;stop-opacity:1" />
    </linearGradient>

    <!-- Green aura -->
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0" />
    </radialGradient>

    <!-- Indigo aura -->
    <radialGradient id="indigoGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0" />
    </radialGradient>

    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>

    <!-- Block gradient -->
    <linearGradient id="blockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>

    <!-- Leaf gradient -->
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>

    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000020" />
    </filter>

    <!-- Shield shadow -->
    <filter id="shieldShadow" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#05966940" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="440" height="300" fill="url(#bgGrad)" rx="12" />

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#4f46e5" stroke-width="1">
    <line x1="0" y1="60" x2="440" y2="60" />
    <line x1="0" y1="120" x2="440" y2="120" />
    <line x1="0" y1="180" x2="440" y2="180" />
    <line x1="0" y1="240" x2="440" y2="240" />
    <line x1="88" y1="0" x2="88" y2="300" />
    <line x1="176" y1="0" x2="176" y2="300" />
    <line x1="264" y1="0" x2="264" y2="300" />
    <line x1="352" y1="0" x2="352" y2="300" />
  </g>

  <!-- ===================== LEFT SIDE: Environmental claims ===================== -->

  <!-- Green aura -->
  <ellipse cx="78" cy="150" rx="70" ry="70" fill="url(#greenGlow)" />

  <!-- Main leaf -->
  <g filter="url(#shadow)">
    <path d="M 55 185
             C 40 165, 38 130, 55 108
             C 65 95, 80 88, 95 90
             C 115 92, 128 105, 125 125
             C 122 148, 105 168, 85 178
             C 75 183, 63 188, 55 185 Z"
          fill="url(#leafGrad)" />
    <!-- Main vein -->
    <path d="M 58 182 Q 90 140 120 95"
          fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.6" stroke-linecap="round" />
    <!-- Side veins -->
    <path d="M 72 168 Q 82 152 95 145"
          fill="none" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.45" stroke-linecap="round" />
    <path d="M 85 150 Q 100 138 110 128"
          fill="none" stroke="#ffffff" stroke-width="1.2" stroke-opacity="0.45" stroke-linecap="round" />
    <!-- Stem -->
    <path d="M 57 184 Q 50 205 48 218"
          fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- Small decorative leaves near stem -->
  <g opacity="0.75">
    <path d="M 30 215 C 25 205, 27 195, 35 192 C 40 190, 46 194, 44 202 C 42 210, 35 216, 30 215 Z"
          fill="#10b981" />
    <path d="M 31 214 Q 38 204 43 196" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round" />
    <path d="M 50 220 C 45 210, 48 200, 56 198 C 61 197, 66 201, 64 208 C 62 215, 55 221, 50 220 Z"
          fill="#059669" />
    <path d="M 51 219 Q 58 210 63 201" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round" />
  </g>

  <!-- Valid claim bubble 1 -->
  <g opacity="0.9" filter="url(#shadow)">
    <rect x="16" y="80" width="38" height="24" rx="12" fill="#10b981" />
    <path d="M 26 95 C 24 91, 26 87, 30 87 C 34 87, 36 91, 34 95 C 32 98, 28 99, 26 95 Z"
          fill="#ffffff" opacity="0.85" />
    <circle cx="44" cy="92" r="3" fill="#ffffff" opacity="0.7" />
  </g>

  <!-- Valid claim bubble 2 -->
  <g opacity="0.85" filter="url(#shadow)">
    <rect x="100" y="63" width="32" height="22" rx="11" fill="#34d399" />
    <circle cx="111" cy="74" r="4" fill="#ffffff" opacity="0.8" />
    <circle cx="121" cy="74" r="3" fill="#ffffff" opacity="0.55" />
  </g>

  <!-- ===================== FAKE / rejected claims ===================== -->

  <!-- Fake claim 1 -->
  <g opacity="0.32">
    <rect x="10" y="118" width="40" height="24" rx="5" fill="#ef4444" />
    <line x1="19" y1="125" x2="29" y2="135" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" />
    <line x1="29" y1="125" x2="19" y2="135" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" />
  </g>

  <!-- Fake claim 2 -->
  <g opacity="0.28">
    <rect x="108" y="186" width="36" height="22" rx="5" fill="#ef4444" />
    <line x1="117" y1="192" x2="126" y2="201" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
    <line x1="126" y1="192" x2="117" y2="201" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- ===================== MIDDLE: Blockchain ===================== -->

  <!-- Indigo aura -->
  <ellipse cx="220" cy="150" rx="80" ry="65" fill="url(#indigoGlow)" />

  <!-- Dashed connector line behind blocks -->
  <line x1="155" y1="150" x2="285" y2="150" stroke="#4f46e5" stroke-width="2" stroke-opacity="0.25" stroke-dasharray="5,3" />

  <!-- Arrow: leaf side to blockchain -->
  <g opacity="0.55">
    <line x1="138" y1="150" x2="155" y2="150" stroke="#10b981" stroke-width="2" stroke-linecap="round" />
    <polygon points="155,145 164,150 155,155" fill="#10b981" />
  </g>

  <!-- Arrow: blockchain to shield -->
  <g opacity="0.55">
    <line x1="285" y1="150" x2="298" y2="150" stroke="#10b981" stroke-width="2" stroke-linecap="round" />
    <polygon points="298,145 307,150 298,155" fill="#10b981" />
  </g>

  <!-- Block 1 (left) -->
  <g filter="url(#shadow)">
    <rect x="158" y="118" width="48" height="64" rx="8" fill="url(#blockGrad)" />
    <rect x="165" y="128" width="34" height="5" rx="2.5" fill="#ffffff" opacity="0.22" />
    <rect x="165" y="137" width="26" height="4" rx="2" fill="#ffffff" opacity="0.18" />
    <rect x="165" y="145" width="30" height="4" rx="2" fill="#ffffff" opacity="0.18" />
    <rect x="165" y="153" width="22" height="4" rx="2" fill="#ffffff" opacity="0.14" />
    <circle cx="182" cy="168" r="4" fill="#ffffff" opacity="0.22" />
  </g>

  <!-- Chain link -->
  <g opacity="0.72">
    <ellipse cx="211" cy="150" rx="7" ry="5" fill="none" stroke="#818cf8" stroke-width="2.5" />
    <ellipse cx="219" cy="150" rx="7" ry="5" fill="none" stroke="#818cf8" stroke-width="2.5" />
  </g>

  <!-- Block 2 (center, taller) -->
  <g filter="url(#shadow)">
    <rect x="226" y="110" width="52" height="80" rx="8" fill="url(#blockGrad)" />
    <!-- Top highlight -->
    <rect x="226" y="110" width="52" height="5" rx="8" fill="#ffffff" opacity="0.14" />
    <rect x="234" y="121" width="36" height="5" rx="2.5" fill="#ffffff" opacity="0.22" />
    <rect x="234" y="130" width="28" height="4" rx="2" fill="#ffffff" opacity="0.18" />
    <rect x="234" y="138" width="32" height="4" rx="2" fill="#ffffff" opacity="0.18" />
    <rect x="234" y="146" width="24" height="4" rx="2" fill="#ffffff" opacity="0.14" />
    <rect x="234" y="154" width="30" height="4" rx="2" fill="#ffffff" opacity="0.14" />
    <!-- Checkmark inside center block -->
    <path d="M 242 170 L 248 177 L 262 162"
          fill="none" stroke="#a7f3d0" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Rejected data diverting downward -->
  <g opacity="0.38">
    <path d="M 220 192 Q 220 210, 207 220"
          fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2" stroke-linecap="round" />
    <polygon points="204,215 211,223 214,212" fill="#ef4444" opacity="0.55" />
    <rect x="190" y="222" width="28" height="20" rx="4" fill="#ef4444" opacity="0.65" />
    <line x1="197" y1="228" x2="204" y2="235" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" />
    <line x1="204" y1="228" x2="197" y2="235" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" />
  </g>

  <!-- ===================== RIGHT SIDE: Shield ===================== -->

  <!-- Shield aura -->
  <ellipse cx="370" cy="150" rx="65" ry="65" fill="url(#greenGlow)" />

  <!-- Shield -->
  <g filter="url(#shieldShadow)">
    <path d="M 370 88
             L 410 105
             L 410 148
             C 410 176, 392 198, 370 207
             C 348 198, 330 176, 330 148
             L 330 105
             Z"
          fill="url(#shieldGrad)" />
    <!-- Inner highlight rim -->
    <path d="M 370 95
             L 404 110
             L 404 148
             C 404 172, 388 191, 370 200
             C 352 191, 336 172, 336 148
             L 336 110
             Z"
          fill="#ffffff" opacity="0.1" />
    <!-- Top rim highlight -->
    <path d="M 370 88 L 410 105 L 404 110 L 370 95 L 336 110 L 330 105 Z"
          fill="#ffffff" opacity="0.18" />
    <!-- Checkmark -->
    <path d="M 350 148 L 363 163 L 392 130"
          fill="none" stroke="#ffffff" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 351 149 L 364 164 L 393 131"
          fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.35" />
  </g>

  <!-- Sparkles around shield -->
  <g transform="translate(317, 99)" opacity="0.72">
    <polygon points="0,-7 1.8,-2 7,-2 2.8,1.5 4.3,7 0,4 -4.3,7 -2.8,1.5 -7,-2 -1.8,-2"
             fill="#10b981" transform="scale(0.72)" />
  </g>
  <g transform="translate(422, 116)" opacity="0.62">
    <polygon points="0,-6 1.5,-1.8 6,-1.8 2.4,1.2 3.7,6 0,3.4 -3.7,6 -2.4,1.2 -6,-1.8 -1.5,-1.8"
             fill="#34d399" transform="scale(0.66)" />
  </g>
  <g transform="translate(324, 196)" opacity="0.5">
    <polygon points="0,-5 1.3,-1.5 5,-1.5 2,1 3,5 0,3 -3,5 -2,1 -5,-1.5 -1.3,-1.5"
             fill="#10b981" transform="scale(0.62)" />
  </g>
  <g transform="translate(418, 187)" opacity="0.52">
    <polygon points="0,-5 1.3,-1.5 5,-1.5 2,1 3,5 0,3 -3,5 -2,1 -5,-1.5 -1.3,-1.5"
             fill="#34d399" transform="scale(0.58)" />
  </g>

  <!-- Small dot accents -->
  <circle cx="309" cy="150" r="3" fill="#10b981" opacity="0.42" />
  <circle cx="431" cy="150" r="2.5" fill="#10b981" opacity="0.36" />
  <circle cx="370" cy="80" r="3" fill="#34d399" opacity="0.5" />

  <!-- Data flow particles -->
  <circle cx="147" cy="144" r="2.5" fill="#10b981" opacity="0.6" />
  <circle cx="142" cy="154" r="1.8" fill="#10b981" opacity="0.4" />
  <circle cx="293" cy="144" r="2.5" fill="#10b981" opacity="0.6" />
  <circle cx="297" cy="155" r="1.8" fill="#10b981" opacity="0.4" />

  <!-- Bottom accent bar -->
  <rect x="60" y="272" width="320" height="3" rx="1.5" fill="#4f46e5" opacity="0.07" />
  <rect x="155" y="272" width="130" height="3" rx="1.5" fill="#4f46e5" opacity="0.09" />
</svg>
