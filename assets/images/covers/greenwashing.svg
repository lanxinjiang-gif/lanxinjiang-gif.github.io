<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="indigo4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadow4" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4f46e5" flood-opacity="0.12"/>
    </filter>
    <filter id="glow4" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg4)" rx="12"/>

  <!-- Decorative -->
  <circle cx="300" cy="200" r="180" fill="#6366f1" opacity="0.025"/>
  <circle cx="80" cy="80" r="60" fill="#10b981" opacity="0.04"/>
  <circle cx="520" cy="320" r="70" fill="#10b981" opacity="0.04"/>

  <!-- Blockchain chain - main horizontal chain -->
  <!-- Block 1 -->
  <g filter="url(#shadow4)" transform="translate(60, 160)">
    <rect width="80" height="80" rx="10" fill="url(#indigo4)"/>
    <rect x="12" y="15" width="56" height="6" rx="3" fill="#fff" opacity="0.3"/>
    <rect x="12" y="28" width="40" height="6" rx="3" fill="#fff" opacity="0.25"/>
    <rect x="12" y="41" width="50" height="6" rx="3" fill="#fff" opacity="0.2"/>
    <!-- Hash lines -->
    <rect x="12" y="58" width="56" height="4" rx="2" fill="#818cf8" opacity="0.5"/>
  </g>

  <!-- Chain link 1-2 -->
  <g>
    <line x1="140" y1="200" x2="170" y2="200" stroke="#4f46e5" stroke-width="4" stroke-linecap="round"/>
    <circle cx="150" cy="200" r="4" fill="#6366f1"/>
    <circle cx="160" cy="200" r="4" fill="#6366f1"/>
  </g>

  <!-- Block 2 -->
  <g filter="url(#shadow4)" transform="translate(170, 160)">
    <rect width="80" height="80" rx="10" fill="url(#indigo4)"/>
    <rect x="12" y="15" width="56" height="6" rx="3" fill="#fff" opacity="0.3"/>
    <rect x="12" y="28" width="40" height="6" rx="3" fill="#fff" opacity="0.25"/>
    <rect x="12" y="41" width="50" height="6" rx="3" fill="#fff" opacity="0.2"/>
    <rect x="12" y="58" width="56" height="4" rx="2" fill="#818cf8" opacity="0.5"/>
  </g>

  <!-- Chain link 2-3 -->
  <g>
    <line x1="250" y1="200" x2="280" y2="200" stroke="#4f46e5" stroke-width="4" stroke-linecap="round"/>
    <circle cx="260" cy="200" r="4" fill="#6366f1"/>
    <circle cx="270" cy="200" r="4" fill="#6366f1"/>
  </g>

  <!-- Block 3 (center, highlighted) -->
  <g filter="url(#shadow4)" transform="translate(280, 155)">
    <rect width="90" height="90" rx="12" fill="url(#indigo4)" stroke="#f59e0b" stroke-width="2"/>
    <rect x="14" y="16" width="62" height="6" rx="3" fill="#fff" opacity="0.3"/>
    <rect x="14" y="30" width="45" height="6" rx="3" fill="#fff" opacity="0.25"/>
    <rect x="14" y="44" width="55" height="6" rx="3" fill="#fff" opacity="0.2"/>
    <rect x="14" y="62" width="62" height="5" rx="2.5" fill="#f59e0b" opacity="0.6"/>
  </g>

  <!-- Chain link 3-4 -->
  <g>
    <line x1="370" y1="200" x2="400" y2="200" stroke="#4f46e5" stroke-width="4" stroke-linecap="round"/>
    <circle cx="380" cy="200" r="4" fill="#6366f1"/>
    <circle cx="390" cy="200" r="4" fill="#6366f1"/>
  </g>

  <!-- Block 4 -->
  <g filter="url(#shadow4)" transform="translate(400, 160)">
    <rect width="80" height="80" rx="10" fill="url(#indigo4)"/>
    <rect x="12" y="15" width="56" height="6" rx="3" fill="#fff" opacity="0.3"/>
    <rect x="12" y="28" width="40" height="6" rx="3" fill="#fff" opacity="0.25"/>
    <rect x="12" y="41" width="50" height="6" rx="3" fill="#fff" opacity="0.2"/>
    <rect x="12" y="58" width="56" height="4" rx="2" fill="#818cf8" opacity="0.5"/>
  </g>

  <!-- Leaf icon - top left of chain -->
  <g transform="translate(120, 75)" filter="url(#glow4)">
    <ellipse cx="0" cy="0" rx="22" ry="30" fill="url(#leafGrad)" transform="rotate(-30)" opacity="0.85"/>
    <line x1="0" y1="15" x2="0" y2="-15" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="0" x2="-8" y2="-8" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="5" x2="7" y2="-2" stroke="#fff" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Connector from leaf to chain -->
  <path d="M130,100 C140,130 130,145 120,160" stroke="#10b981" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- ESG circle icon - top right -->
  <g transform="translate(440, 80)" filter="url(#glow4)">
    <circle r="28" fill="white" stroke="#10b981" stroke-width="2.5"/>
    <!-- E S G letters as abstract segments -->
    <path d="M-12,-8 L-4,-8 M-12,0 L-6,0 M-12,8 L-4,8" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M0,-8 C6,-8 6,-1 0,-1 C6,-1 6,8 0,8" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M16,8 L8,8 L8,-2 C8,-8 16,-8 16,-4 L16,0 L11,0" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Connector from ESG to chain -->
  <path d="M430,105 C425,130 425,145 425,160" stroke="#10b981" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Smart contract icon - below chain center -->
  <g transform="translate(325, 310)" filter="url(#shadow4)">
    <rect x="-40" y="-25" width="80" height="50" rx="8" fill="white" stroke="#6366f1" stroke-width="2"/>
    <!-- Code brackets -->
    <text x="-22" y="6" font-family="monospace" font-size="22" fill="#4f46e5" opacity="0.7">{</text>
    <text x="12" y="6" font-family="monospace" font-size="22" fill="#4f46e5" opacity="0.7">}</text>
    <!-- Checkmark inside -->
    <polyline points="-5,0 -1,5 8,-4" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Connector from chain to smart contract -->
  <path d="M325,250 L325,285" stroke="#6366f1" stroke-width="2" fill="none" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Second leaf - bottom left -->
  <g transform="translate(200, 330)" opacity="0.7">
    <ellipse cx="0" cy="0" rx="15" ry="22" fill="url(#leafGrad)" transform="rotate(20)" opacity="0.6"/>
    <line x1="0" y1="12" x2="0" y2="-10" stroke="#fff" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Third leaf - top center -->
  <g transform="translate(300, 55)" opacity="0.6">
    <ellipse cx="0" cy="0" rx="12" ry="18" fill="url(#leafGrad)" transform="rotate(-15)" opacity="0.5"/>
    <line x1="0" y1="10" x2="0" y2="-8" stroke="#fff" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Shield icon (trust/verification) -->
  <g transform="translate(530, 200)" filter="url(#glow4)">
    <path d="M0,-28 L20,-18 L20,5 C20,18 0,30 0,30 C0,30 -20,18 -20,5 L-20,-18 Z" fill="url(#green)" opacity="0.8"/>
    <polyline points="-7,-2 -2,5 9,-6" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Connection from block 4 to shield -->
  <path d="M480,200 L510,200" stroke="#10b981" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Floating particles -->
  <circle cx="50" cy="350" r="3" fill="#93c5fd" opacity="0.5"/>
  <circle cx="560" cy="60" r="3" fill="#10b981" opacity="0.4"/>
  <circle cx="250" cy="30" r="2" fill="#6366f1" opacity="0.3"/>
  <circle cx="500" cy="370" r="2" fill="#c7d2fe" opacity="0.5"/>
  <circle cx="160" cy="370" r="3" fill="#10b981" opacity="0.3"/>
</svg>