<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="indigo3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="funnelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow3" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4f46e5" flood-opacity="0.15"/>
    </filter>
    <filter id="glow3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg3)" rx="12"/>

  <!-- Decorative circles -->
  <circle cx="60" cy="60" r="90" fill="#6366f1" opacity="0.04"/>
  <circle cx="540" cy="340" r="80" fill="#6366f1" opacity="0.04"/>
  <circle cx="300" cy="200" r="170" fill="#4f46e5" opacity="0.02"/>

  <!-- Incoming data streams (left side) - scattered data points -->
  <g opacity="0.7">
    <!-- Data point clusters -->
    <circle cx="55" cy="100" r="8" fill="#c7d2fe" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="85" cy="75" r="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="40" cy="150" r="7" fill="#c7d2fe" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="95" cy="140" r="9" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="60" cy="200" r="6" fill="#c7d2fe" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="80" cy="230" r="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="45" cy="270" r="7" fill="#c7d2fe" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="90" cy="290" r="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="70" cy="320" r="8" fill="#c7d2fe" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="50" cy="340" r="6" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
  </g>

  <!-- Flow arrows from data to funnel -->
  <g stroke="#93c5fd" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M95,100 C140,100 150,120 190,130" stroke-dasharray="4,3"/>
    <path d="M100,150 C140,150 160,155 190,160" stroke-dasharray="4,3"/>
    <path d="M90,200 C130,200 160,200 190,200" stroke-dasharray="4,3"/>
    <path d="M95,250 C130,250 160,240 190,235" stroke-dasharray="4,3"/>
    <path d="M85,300 C130,290 160,275 190,265" stroke-dasharray="4,3"/>
  </g>

  <!-- Funnel shape -->
  <g filter="url(#shadow3)">
    <path d="M190,90 L340,90 L340,110 C340,110 330,115 320,130 L310,150 C305,160 300,170 295,190 L290,210 L285,240 L280,260 L278,280 L275,290 L252,290 L250,280 L247,260 L244,240 L240,210 L235,190 L230,170 L220,150 L210,130 C200,115 190,110 190,110 Z"
          fill="url(#funnelGrad)" opacity="0.85"/>
    <!-- Funnel inner highlight -->
    <path d="M210,95 L320,95 L310,120 L300,150 L290,190 L285,230 L280,260 L275,285 L255,285 L250,260 L245,230 L240,190 L230,150 L220,120 Z"
          fill="#818cf8" opacity="0.3"/>
  </g>

  <!-- Gear/processing icons inside funnel -->
  <g transform="translate(265, 140)" opacity="0.8">
    <circle r="12" fill="none" stroke="#fff" stroke-width="2"/>
    <circle r="4" fill="#fff"/>
    <!-- Gear teeth -->
    <g stroke="#fff" stroke-width="2">
      <line x1="0" y1="-14" x2="0" y2="-10"/>
      <line x1="0" y1="10" x2="0" y2="14"/>
      <line x1="-14" y1="0" x2="-10" y2="0"/>
      <line x1="10" y1="0" x2="14" y2="0"/>
      <line x1="-10" y1="-10" x2="-7" y2="-7"/>
      <line x1="7" y1="7" x2="10" y2="10"/>
      <line x1="10" y1="-10" x2="7" y2="-7"/>
      <line x1="-7" y1="7" x2="-10" y2="10"/>
    </g>
  </g>

  <g transform="translate(265, 200)" opacity="0.6">
    <circle r="8" fill="none" stroke="#fff" stroke-width="1.5"/>
    <circle r="3" fill="#fff"/>
  </g>

  <!-- Output flow from funnel bottom -->
  <path d="M265,295 L265,320 C265,325 270,330 280,330 L380,330"
        stroke="#4f46e5" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  <polygon points="380,324 395,330 380,336" fill="#4f46e5" opacity="0.6"/>

  <!-- Output: refined/accurate results (right side) -->
  <g filter="url(#shadow3)" transform="translate(410, 120)">
    <!-- Result card -->
    <rect width="160" height="220" rx="12" fill="white" stroke="#e0e7ff" stroke-width="1.5"/>

    <!-- Accuracy meter / gauge -->
    <g transform="translate(80, 70)">
      <path d="M-40,0 A40,40 0 0,1 40,0" fill="none" stroke="#e0e7ff" stroke-width="8" stroke-linecap="round"/>
      <path d="M-40,0 A40,40 0 0,1 35,-18" fill="none" stroke="url(#indigo3)" stroke-width="8" stroke-linecap="round"/>
      <!-- Needle -->
      <line x1="0" y1="0" x2="28" y2="-22" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
      <circle r="5" fill="#4f46e5"/>
    </g>

    <!-- Clean output bars -->
    <rect x="20" y="110" width="120" height="10" rx="5" fill="#e0e7ff"/>
    <rect x="20" y="110" width="108" height="10" rx="5" fill="#6366f1" opacity="0.7"/>

    <rect x="20" y="130" width="120" height="10" rx="5" fill="#e0e7ff"/>
    <rect x="20" y="130" width="96" height="10" rx="5" fill="#6366f1" opacity="0.6"/>

    <rect x="20" y="150" width="120" height="10" rx="5" fill="#e0e7ff"/>
    <rect x="20" y="150" width="114" height="10" rx="5" fill="#6366f1" opacity="0.8"/>

    <!-- Checkmark -->
    <g transform="translate(80, 190)">
      <circle r="14" fill="#10b981" filter="url(#glow3)"/>
      <polyline points="-6,0 -2,5 7,-5" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Improvement arrow -->
  <g transform="translate(490, 90)" filter="url(#glow3)">
    <path d="M0,30 L0,5 L-10,5 L5,-10 L20,5 L10,5 L10,30" fill="#f59e0b" opacity="0.8"/>
  </g>

  <!-- Floating particles -->
  <circle cx="150" cy="50" r="3" fill="#93c5fd" opacity="0.5"/>
  <circle cx="350" cy="60" r="2" fill="#6366f1" opacity="0.4"/>
  <circle cx="550" cy="100" r="3" fill="#93c5fd" opacity="0.5"/>
  <circle cx="180" cy="370" r="2" fill="#c7d2fe" opacity="0.6"/>
</svg>