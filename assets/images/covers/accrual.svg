<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="mlArrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Title -->
  <text x="300" y="38" font-family="Arial, sans-serif" font-size="15" fill="#312e81" text-anchor="middle" font-weight="bold">Improving Accrual Estimates with ML</text>
  <text x="300" y="56" font-family="Arial, sans-serif" font-size="11" fill="#6366f1" text-anchor="middle">Traditional Estimates vs ML-Enhanced Precision</text>

  <!-- BEFORE section (left) -->
  <rect x="30" y="75" width="220" height="250" rx="10" fill="#ffffff" stroke="#e0e7ff" stroke-width="1.5"/>
  <text x="140" y="100" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle" font-weight="bold">BEFORE</text>
  <text x="140" y="115" font-family="Arial, sans-serif" font-size="9" fill="#94a3b8" text-anchor="middle">Traditional Estimates</text>

  <!-- Target/bullseye (before - scattered, inaccurate) -->
  <circle cx="140" cy="195" r="55" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <circle cx="140" cy="195" r="40" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="140" cy="195" r="25" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <circle cx="140" cy="195" r="10" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
  <!-- Scattered dots (inaccurate estimates) - far from center -->
  <circle cx="115" cy="160" r="4" fill="#f59e0b" opacity="0.7"/>
  <circle cx="170" cy="175" r="4" fill="#f59e0b" opacity="0.7"/>
  <circle cx="100" cy="210" r="4" fill="#f59e0b" opacity="0.7"/>
  <circle cx="175" cy="220" r="4" fill="#f59e0b" opacity="0.7"/>
  <circle cx="125" cy="235" r="4" fill="#f59e0b" opacity="0.7"/>
  <circle cx="160" cy="150" r="4" fill="#f59e0b" opacity="0.7"/>
  <circle cx="95" cy="185" r="4" fill="#f59e0b" opacity="0.7"/>
  <circle cx="180" cy="200" r="4" fill="#f59e0b" opacity="0.7"/>

  <!-- Error bars (wide) -->
  <line x1="110" y1="275" x2="110" y2="310" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="275" x2="120" y2="275" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
  <line x1="100" y1="310" x2="120" y2="310" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
  <circle cx="110" cy="292" r="2.5" fill="#ef4444" opacity="0.6"/>

  <line x1="170" y1="270" x2="170" y2="315" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
  <line x1="160" y1="270" x2="180" y2="270" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
  <line x1="160" y1="315" x2="180" y2="315" stroke="#ef4444" stroke-width="2" opacity="0.6"/>
  <circle cx="170" cy="292" r="2.5" fill="#ef4444" opacity="0.6"/>

  <text x="140" y="340" font-family="Arial, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">Wide error range</text>

  <!-- Central ML arrow -->
  <rect x="260" y="170" width="80" height="50" rx="8" fill="url(#mlArrow)"/>
  <text x="300" y="192" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="bold">ML</text>
  <text x="300" y="207" font-family="Arial, sans-serif" font-size="8" fill="#c7d2fe" text-anchor="middle">enhance</text>
  <!-- Arrow indicators -->
  <polygon points="340,195 355,185 355,205" fill="#6366f1" opacity="0.6"/>
  <polygon points="260,195 245,185 245,205" fill="#6366f1" opacity="0.3"/>
  <!-- Decorative arrows -->
  <text x="300" y="240" font-family="Arial, sans-serif" font-size="22" fill="#6366f1" text-anchor="middle" opacity="0.5">→</text>

  <!-- AFTER section (right) -->
  <rect x="355" y="75" width="220" height="250" rx="10" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="465" y="100" font-family="Arial, sans-serif" font-size="12" fill="#4f46e5" text-anchor="middle" font-weight="bold">AFTER</text>
  <text x="465" y="115" font-family="Arial, sans-serif" font-size="9" fill="#6366f1" text-anchor="middle">ML-Enhanced Estimates</text>

  <!-- Target/bullseye (after - precise, accurate) -->
  <circle cx="465" cy="195" r="55" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <circle cx="465" cy="195" r="40" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <circle cx="465" cy="195" r="25" fill="#c7d2fe" stroke="#a5b4fc" stroke-width="1"/>
  <circle cx="465" cy="195" r="10" fill="#6366f1" stroke="#4f46e5" stroke-width="1.5"/>
  <!-- Clustered dots (accurate estimates) - tight around center -->
  <circle cx="462" cy="192" r="4" fill="#f59e0b"/>
  <circle cx="470" cy="198" r="4" fill="#f59e0b"/>
  <circle cx="460" cy="200" r="4" fill="#f59e0b"/>
  <circle cx="468" cy="189" r="4" fill="#f59e0b"/>
  <circle cx="458" cy="194" r="4" fill="#f59e0b"/>
  <circle cx="472" cy="193" r="4" fill="#f59e0b"/>
  <circle cx="465" cy="203" r="4" fill="#f59e0b"/>
  <circle cx="466" cy="186" r="4" fill="#f59e0b"/>

  <!-- Error bars (narrow/tight) -->
  <line x1="435" y1="285" x2="435" y2="300" stroke="#22c55e" stroke-width="2"/>
  <line x1="429" y1="285" x2="441" y2="285" stroke="#22c55e" stroke-width="2"/>
  <line x1="429" y1="300" x2="441" y2="300" stroke="#22c55e" stroke-width="2"/>
  <circle cx="435" cy="292" r="2.5" fill="#22c55e"/>

  <line x1="495" y1="285" x2="495" y2="300" stroke="#22c55e" stroke-width="2"/>
  <line x1="489" y1="285" x2="501" y2="285" stroke="#22c55e" stroke-width="2"/>
  <line x1="489" y1="300" x2="501" y2="300" stroke="#22c55e" stroke-width="2"/>
  <circle cx="495" cy="292" r="2.5" fill="#22c55e"/>

  <text x="465" y="340" font-family="Arial, sans-serif" font-size="9" fill="#22c55e" text-anchor="middle" font-weight="600">Tight, accurate estimates</text>

  <!-- Improvement indicator -->
  <text x="300" y="365" font-family="Arial, sans-serif" font-size="10" fill="#4f46e5" text-anchor="middle" font-weight="600">Accrual accuracy significantly improved</text>
  <text x="300" y="380" font-family="Arial, sans-serif" font-size="9" fill="#93c5fd" text-anchor="middle">Bad debts, warranty costs, revenue recognition</text>

  <!-- Decorative -->
  <circle cx="15" cy="385" r="3" fill="#dbeafe" opacity="0.5"/>
  <circle cx="585" cy="15" r="3" fill="#dbeafe" opacity="0.5"/>
</svg>