<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="indigo5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="simplGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow5" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#4f46e5" flood-opacity="0.12"/>
    </filter>
    <filter id="glow5" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg5)" rx="12"/>
  <circle cx="150" cy="200" r="160" fill="#6366f1" opacity="0.025"/>
  <circle cx="450" cy="200" r="160" fill="#6366f1" opacity="0.025"/>

  <!-- LEFT SIDE: Complex tangled network -->
  <g opacity="0.85">
    <!-- Messy connection lines -->
    <g stroke="#c7d2fe" stroke-width="1.2" fill="none" opacity="0.6">
      <path d="M60,80 C100,120 80,180 130,150"/>
      <path d="M40,160 C80,140 120,200 90,240"/>
      <path d="M110,70 C150,110 100,150 160,180"/>
      <path d="M70,280 C120,250 80,200 140,220"/>
      <path d="M130,100 C90,150 150,170 120,250"/>
      <path d="M50,220 C100,200 130,280 170,260"/>
      <path d="M100,60 C60,120 140,130 110,200"/>
      <path d="M40,300 C100,280 60,230 130,270"/>
      <path d="M160,90 C130,130 170,200 140,160"/>
      <path d="M80,340 C120,310 150,330 170,290"/>
      <path d="M55,120 C95,180 65,250 115,300"/>
      <path d="M170,130 C130,170 160,250 120,320"/>
    </g>

    <!-- Scattered nodes (chaotic) -->
    <circle cx="60" cy="80" r="10" fill="#c7d2fe" stroke="#a5b4fc" stroke-width="1.5"/>
    <circle cx="110" cy="70" r="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="40" cy="160" r="9" fill="#c7d2fe" stroke="#a5b4fc" stroke-width="1.5"/>
    <circle cx="130" cy="150" r="7" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="160" cy="90" r="8" fill="#c7d2fe" stroke="#a5b4fc" stroke-width="1.5"/>
    <circle cx="90" cy="120" r="6" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
    <circle cx="70" cy="220" r="9" fill="#c7d2fe" stroke="#a5b4fc" stroke-width="1.5"/>
    <circle cx="130" cy="250" r="7" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="50" cy="280" r="8" fill="#c7d2fe" stroke="#a5b4fc" stroke-width="1.5"/>
    <circle cx="140" cy="300" r="6" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
    <circle cx="100" cy="200" r="10" fill="#c7d2fe" stroke="#a5b4fc" stroke-width="1.5"/>
    <circle cx="170" cy="180" r="7" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.5"/>
    <circle cx="80" cy="320" r="8" fill="#c7d2fe" stroke="#a5b4fc" stroke-width="1.5"/>
    <circle cx="160" cy="260" r="6" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
    <circle cx="50" cy="340" r="7" fill="#c7d2fe" stroke="#a5b4fc" stroke-width="1.5"/>
    <circle cx="170" cy="330" r="5" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  </g>

  <!-- CENTER: Transformation arrow -->
  <g transform="translate(250, 175)">
    <!-- Arrow body -->
    <rect x="0" y="-20" width="90" height="40" rx="8" fill="url(#indigo5)" opacity="0.15"/>
    <g filter="url(#glow5)">
      <!-- Arrow shape -->
      <polygon points="30,-12 70,-12 70,-20 95,0 70,20 70,12 30,12" fill="url(#indigo5)" opacity="0.7"/>
    </g>
    <!-- Sparkle dots on arrow -->
    <circle cx="45" cy="-5" r="2" fill="#f59e0b" opacity="0.8"/>
    <circle cx="55" cy="5" r="2" fill="#f59e0b" opacity="0.6"/>
    <circle cx="65" cy="-3" r="1.5" fill="#f59e0b" opacity="0.7"/>
  </g>

  <!-- RIGHT SIDE: Clean organized categories -->
  <g filter="url(#shadow5)">
    <!-- Category E (Environmental) -->
    <g transform="translate(380, 55)">
      <rect width="180" height="75" rx="12" fill="white" stroke="#10b981" stroke-width="2"/>
      <!-- Green circle badge -->
      <circle cx="30" cy="37" r="16" fill="#10b981" opacity="0.15"/>
      <circle cx="30" cy="37" r="10" fill="#10b981"/>
      <!-- Leaf inside -->
      <ellipse cx="30" cy="35" rx="5" ry="7" fill="#fff" transform="rotate(-20, 30, 35)" opacity="0.9"/>
      <!-- Lines -->
      <rect x="55" y="22" width="100" height="7" rx="3.5" fill="#d1fae5"/>
      <rect x="55" y="37" width="75" height="7" rx="3.5" fill="#d1fae5"/>
      <rect x="55" y="52" width="90" height="7" rx="3.5" fill="#ecfdf5"/>
    </g>

    <!-- Category S (Social) -->
    <g transform="translate(380, 155)">
      <rect width="180" height="75" rx="12" fill="white" stroke="#6366f1" stroke-width="2"/>
      <!-- Purple circle badge -->
      <circle cx="30" cy="37" r="16" fill="#6366f1" opacity="0.15"/>
      <circle cx="30" cy="37" r="10" fill="#6366f1"/>
      <!-- People icon inside -->
      <circle cx="27" cy="33" r="3" fill="#fff"/>
      <circle cx="33" cy="33" r="3" fill="#fff"/>
      <path d="M22,42 C22,38 27,36 30,36 C33,36 38,38 38,42" fill="#fff" opacity="0.8"/>
      <!-- Lines -->
      <rect x="55" y="22" width="100" height="7" rx="3.5" fill="#e0e7ff"/>
      <rect x="55" y="37" width="80" height="7" rx="3.5" fill="#e0e7ff"/>
      <rect x="55" y="52" width="95" height="7" rx="3.5" fill="#eef2ff"/>
    </g>

    <!-- Category G (Governance) -->
    <g transform="translate(380, 255)">
      <rect width="180" height="75" rx="12" fill="white" stroke="#f59e0b" stroke-width="2"/>
      <!-- Amber circle badge -->
      <circle cx="30" cy="37" r="16" fill="#f59e0b" opacity="0.15"/>
      <circle cx="30" cy="37" r="10" fill="#f59e0b"/>
      <!-- Scale/balance icon inside -->
      <line x1="30" y1="30" x2="30" y2="43" stroke="#fff" stroke-width="2"/>
      <line x1="22" y1="34" x2="38" y2="34" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="22" cy="37" r="2.5" fill="#fff" opacity="0.8"/>
      <circle cx="38" cy="37" r="2.5" fill="#fff" opacity="0.8"/>
      <!-- Lines -->
      <rect x="55" y="22" width="100" height="7" rx="3.5" fill="#fef3c7"/>
      <rect x="55" y="37" width="70" height="7" rx="3.5" fill="#fef3c7"/>
      <rect x="55" y="52" width="88" height="7" rx="3.5" fill="#fffbeb"/>
    </g>
  </g>

  <!-- Subtle connection lines from arrow to categories -->
  <path d="M345,175 C360,175 370,92 380,92" stroke="#6366f1" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M345,175 C360,175 370,192 380,192" stroke="#6366f1" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M345,175 C360,175 370,292 380,292" stroke="#6366f1" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- Floating decorative elements -->
  <circle cx="300" cy="40" r="3" fill="#93c5fd" opacity="0.5"/>
  <circle cx="300" cy="370" r="3" fill="#93c5fd" opacity="0.5"/>
  <circle cx="580" cy="380" r="2" fill="#c7d2fe" opacity="0.4"/>
  <circle cx="20" cy="30" r="2" fill="#c7d2fe" opacity="0.4"/>
</svg>