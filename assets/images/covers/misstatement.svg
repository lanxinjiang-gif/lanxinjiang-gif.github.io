<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 300" width="440" height="300">
  <defs>
    <!-- Background grid pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>

    <!-- Drop shadow for document -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>

    <!-- Glow for magnifier lens -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Document body gradient -->
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>

    <!-- Header bar gradient -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>

    <!-- Red row highlight -->
    <linearGradient id="rowRed" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>

    <!-- Green row highlight -->
    <linearGradient id="rowGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>

    <!-- Scan beam -->
    <linearGradient id="beamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4f46e5" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </linearGradient>

    <!-- Lens interior gradient -->
    <radialGradient id="lensGrad" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#eef2ff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#c7d2fe" stop-opacity="0.45"/>
    </radialGradient>

    <!-- ML node gradient -->
    <radialGradient id="nodeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </radialGradient>

    <!-- Output node glow gradient -->
    <radialGradient id="outputGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </radialGradient>
  </defs>

  <!-- ======= BACKGROUND ======= -->
  <rect width="440" height="300" fill="#f8fafc"/>
  <rect width="440" height="300" fill="url(#grid)"/>

  <!-- ======= DOCUMENT ======= -->
  <!-- Offset shadow -->
  <rect x="40" y="45" width="182" height="214" rx="7" fill="#cbd5e1" opacity="0.35"/>
  <!-- Document body -->
  <rect x="36" y="41" width="182" height="214" rx="7" fill="url(#docGrad)" filter="url(#shadow)"/>

  <!-- Header bar -->
  <rect x="36" y="41" width="182" height="26" rx="7" fill="url(#headerGrad)"/>
  <!-- Flatten bottom of header rounded rect -->
  <rect x="36" y="54" width="182" height="13" fill="url(#headerGrad)"/>

  <!-- Header column label blocks -->
  <rect x="44" y="48" width="46" height="9" rx="2" fill="white" opacity="0.28"/>
  <rect x="102" y="48" width="38" height="9" rx="2" fill="white" opacity="0.28"/>
  <rect x="152" y="48" width="24" height="9" rx="2" fill="white" opacity="0.28"/>
  <rect x="188" y="48" width="22" height="9" rx="2" fill="white" opacity="0.28"/>

  <!-- Vertical column dividers -->
  <line x1="98" y1="67" x2="98" y2="255" stroke="#e2e8f0" stroke-width="0.8"/>
  <line x1="150" y1="67" x2="150" y2="255" stroke="#e2e8f0" stroke-width="0.8"/>
  <line x1="186" y1="67" x2="186" y2="255" stroke="#e2e8f0" stroke-width="0.8"/>

  <!-- ---- ROW 1: Clean ---- -->
  <rect x="36" y="67" width="182" height="25" fill="url(#rowGreen)"/>
  <line x1="36" y1="92" x2="218" y2="92" stroke="#d1fae5" stroke-width="0.8"/>
  <rect x="44" y="75" width="42" height="8" rx="2" fill="#10b981" opacity="0.32"/>
  <rect x="104" y="75" width="28" height="8" rx="2" fill="#10b981" opacity="0.32"/>
  <rect x="156" y="75" width="18" height="8" rx="2" fill="#10b981" opacity="0.32"/>

  <!-- ---- ROW 2: Warning ---- -->
  <rect x="36" y="92" width="182" height="25" fill="url(#rowRed)"/>
  <line x1="36" y1="117" x2="218" y2="117" stroke="#fecaca" stroke-width="0.8"/>
  <rect x="44" y="100" width="42" height="8" rx="2" fill="#ef4444" opacity="0.38"/>
  <rect x="104" y="100" width="34" height="8" rx="2" fill="#ef4444" opacity="0.38"/>
  <rect x="156" y="100" width="16" height="8" rx="2" fill="#ef4444" opacity="0.38"/>

  <!-- ---- ROW 3: Clean ---- -->
  <rect x="36" y="117" width="182" height="25" fill="url(#rowGreen)"/>
  <line x1="36" y1="142" x2="218" y2="142" stroke="#d1fae5" stroke-width="0.8"/>
  <rect x="44" y="125" width="36" height="8" rx="2" fill="#10b981" opacity="0.32"/>
  <rect x="104" y="125" width="30" height="8" rx="2" fill="#10b981" opacity="0.32"/>
  <rect x="156" y="125" width="22" height="8" rx="2" fill="#10b981" opacity="0.32"/>

  <!-- ---- ROW 4: Warning ---- -->
  <rect x="36" y="142" width="182" height="25" fill="url(#rowRed)"/>
  <line x1="36" y1="167" x2="218" y2="167" stroke="#fecaca" stroke-width="0.8"/>
  <rect x="44" y="150" width="48" height="8" rx="2" fill="#ef4444" opacity="0.38"/>
  <rect x="104" y="150" width="22" height="8" rx="2" fill="#ef4444" opacity="0.38"/>
  <rect x="156" y="150" width="26" height="8" rx="2" fill="#ef4444" opacity="0.38"/>

  <!-- ---- ROW 5: Clean ---- -->
  <rect x="36" y="167" width="182" height="25" fill="url(#rowGreen)"/>
  <line x1="36" y1="192" x2="218" y2="192" stroke="#d1fae5" stroke-width="0.8"/>
  <rect x="44" y="175" width="38" height="8" rx="2" fill="#10b981" opacity="0.32"/>
  <rect x="104" y="175" width="32" height="8" rx="2" fill="#10b981" opacity="0.32"/>
  <rect x="156" y="175" width="20" height="8" rx="2" fill="#10b981" opacity="0.32"/>

  <!-- ---- ROW 6: Warning ---- -->
  <rect x="36" y="192" width="182" height="25" fill="url(#rowRed)"/>
  <line x1="36" y1="217" x2="218" y2="217" stroke="#fecaca" stroke-width="0.8"/>
  <rect x="44" y="200" width="44" height="8" rx="2" fill="#ef4444" opacity="0.38"/>
  <rect x="104" y="200" width="26" height="8" rx="2" fill="#ef4444" opacity="0.38"/>
  <rect x="156" y="200" width="20" height="8" rx="2" fill="#ef4444" opacity="0.38"/>

  <!-- ---- ROW 7: Neutral ---- -->
  <rect x="36" y="217" width="182" height="38" fill="#f8fafc"/>
  <rect x="44" y="226" width="34" height="8" rx="2" fill="#94a3b8" opacity="0.35"/>
  <rect x="104" y="226" width="28" height="8" rx="2" fill="#94a3b8" opacity="0.35"/>
  <rect x="156" y="226" width="22" height="8" rx="2" fill="#94a3b8" opacity="0.35"/>

  <!-- Document border -->
  <rect x="36" y="41" width="182" height="214" rx="7" fill="none" stroke="#c7d2fe" stroke-width="1.2"/>

  <!-- ======= ROW INDICATOR ICONS ======= -->
  <!-- Green checkmarks -->
  <circle cx="207" cy="79" r="7" fill="#10b981" opacity="0.14"/>
  <polyline points="203,79 206,82 211,75" fill="none" stroke="#10b981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="207" cy="129" r="7" fill="#10b981" opacity="0.14"/>
  <polyline points="203,129 206,132 211,125" fill="none" stroke="#10b981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="207" cy="179" r="7" fill="#10b981" opacity="0.14"/>
  <polyline points="203,179 206,182 211,175" fill="none" stroke="#10b981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Red warning badges -->
  <circle cx="207" cy="104" r="7" fill="#ef4444" opacity="0.14"/>
  <line x1="207" y1="100" x2="207" y2="106" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
  <circle cx="207" cy="109.5" r="1.4" fill="#ef4444"/>

  <circle cx="207" cy="154" r="7" fill="#ef4444" opacity="0.14"/>
  <line x1="207" y1="150" x2="207" y2="156" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
  <circle cx="207" cy="159.5" r="1.4" fill="#ef4444"/>

  <circle cx="207" cy="204" r="7" fill="#ef4444" opacity="0.14"/>
  <line x1="207" y1="200" x2="207" y2="206" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
  <circle cx="207" cy="209.5" r="1.4" fill="#ef4444"/>

  <!-- ======= SCAN BEAM (over document) ======= -->
  <rect x="36" y="90" width="182" height="32" fill="url(#beamGrad)" rx="2"/>

  <!-- ======= WARNING FLAGS on flagged rows ======= -->
  <!-- Flag pole + banner on row 2 -->
  <line x1="222" y1="95" x2="222" y2="117" stroke="#ef4444" stroke-width="1.6" stroke-opacity="0.75"/>
  <polygon points="222,95 235,99 222,103" fill="#ef4444" opacity="0.88"/>

  <!-- Flag on row 4 -->
  <line x1="222" y1="145" x2="222" y2="167" stroke="#ef4444" stroke-width="1.6" stroke-opacity="0.75"/>
  <polygon points="222,145 235,149 222,153" fill="#ef4444" opacity="0.88"/>

  <!-- Flag on row 6 -->
  <line x1="222" y1="195" x2="222" y2="217" stroke="#ef4444" stroke-width="1.6" stroke-opacity="0.75"/>
  <polygon points="222,195 235,199 222,203" fill="#ef4444" opacity="0.88"/>

  <!-- ======= MAGNIFYING GLASS ======= -->
  <!-- Outer glow halo -->
  <circle cx="285" cy="152" r="46" fill="#e0e7ff" opacity="0.22"/>

  <!-- Lens fill -->
  <circle cx="285" cy="152" r="37" fill="url(#lensGrad)"/>

  <!-- Lens rim -->
  <circle cx="285" cy="152" r="37" fill="none" stroke="#4f46e5" stroke-width="3.5" filter="url(#glow)" opacity="0.88"/>

  <!-- Inner detail ring -->
  <circle cx="285" cy="152" r="31" fill="none" stroke="#818cf8" stroke-width="0.7" opacity="0.5"/>

  <!-- Data lines visible through lens (stylized) -->
  <rect x="264" y="140" width="42" height="5" rx="2.5" fill="#4f46e5" opacity="0.16"/>
  <rect x="264" y="150" width="42" height="5" rx="2.5" fill="#ef4444" opacity="0.30"/>
  <rect x="264" y="160" width="42" height="5" rx="2.5" fill="#4f46e5" opacity="0.16"/>
  <!-- Highlight on warning row inside lens -->
  <rect x="264" y="150" width="42" height="5" rx="2.5" fill="#ef4444" opacity="0.10"/>

  <!-- Handle -->
  <line x1="313" y1="178" x2="338" y2="206" stroke="#4f46e5" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
  <!-- Handle sheen -->
  <line x1="311" y1="177" x2="336" y2="205" stroke="#818cf8" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- Lens glare -->
  <ellipse cx="270" cy="138" rx="9" ry="5.5" fill="white" opacity="0.38" transform="rotate(-30 270 138)"/>

  <!-- ======= CONNECTING DASHES (doc → lens) ======= -->
  <line x1="237" y1="104" x2="252" y2="145" stroke="#ef4444" stroke-width="0.9" stroke-dasharray="3 3" stroke-opacity="0.4"/>
  <line x1="237" y1="154" x2="248" y2="154" stroke="#4f46e5" stroke-width="0.9" stroke-dasharray="3 3" stroke-opacity="0.35"/>
  <line x1="237" y1="204" x2="253" y2="163" stroke="#ef4444" stroke-width="0.9" stroke-dasharray="3 3" stroke-opacity="0.4"/>

  <!-- ======= ML NEURAL NETWORK ======= -->
  <!-- Connecting lines (drawn before nodes) -->
  <!-- Layer 1 → Layer 2 -->
  <line x1="340" y1="112" x2="368" y2="140" stroke="#818cf8" stroke-width="1.1" stroke-opacity="0.5"/>
  <line x1="340" y1="112" x2="368" y2="165" stroke="#818cf8" stroke-width="1.1" stroke-opacity="0.4"/>
  <line x1="340" y1="152" x2="368" y2="140" stroke="#818cf8" stroke-width="1.1" stroke-opacity="0.5"/>
  <line x1="340" y1="152" x2="368" y2="165" stroke="#818cf8" stroke-width="1.1" stroke-opacity="0.5"/>
  <line x1="340" y1="192" x2="368" y2="165" stroke="#818cf8" stroke-width="1.1" stroke-opacity="0.5"/>
  <line x1="340" y1="192" x2="368" y2="140" stroke="#818cf8" stroke-width="0.9" stroke-opacity="0.3"/>

  <!-- Layer 2 → Output -->
  <line x1="368" y1="140" x2="404" y2="152" stroke="#818cf8" stroke-width="1.3" stroke-opacity="0.6"/>
  <line x1="368" y1="165" x2="404" y2="152" stroke="#818cf8" stroke-width="1.3" stroke-opacity="0.6"/>

  <!-- Connecting dash: lens → first layer -->
  <line x1="323" y1="152" x2="331" y2="152" stroke="#4f46e5" stroke-width="1.2" stroke-dasharray="3 2" stroke-opacity="0.45"/>

  <!-- Input layer nodes (3) -->
  <circle cx="340" cy="112" r="9" fill="url(#nodeGrad)" opacity="0.85"/>
  <circle cx="337" cy="109" r="3" fill="white" opacity="0.32"/>

  <circle cx="340" cy="152" r="9" fill="url(#nodeGrad)" opacity="0.85"/>
  <circle cx="337" cy="149" r="3" fill="white" opacity="0.32"/>

  <circle cx="340" cy="192" r="9" fill="url(#nodeGrad)" opacity="0.85"/>
  <circle cx="337" cy="189" r="3" fill="white" opacity="0.32"/>

  <!-- Hidden layer nodes (2) -->
  <circle cx="368" cy="140" r="10" fill="url(#nodeGrad)" opacity="0.9"/>
  <circle cx="365" cy="137" r="3.5" fill="white" opacity="0.32"/>

  <circle cx="368" cy="165" r="10" fill="url(#nodeGrad)" opacity="0.9"/>
  <circle cx="365" cy="162" r="3.5" fill="white" opacity="0.32"/>

  <!-- Output node (prominent) -->
  <circle cx="404" cy="152" r="15" fill="#4f46e5" opacity="0.12"/>
  <circle cx="404" cy="152" r="12" fill="url(#outputGrad)" opacity="0.96"/>
  <circle cx="400" cy="148" r="4" fill="white" opacity="0.38"/>
  <!-- Pulse ring -->
  <circle cx="404" cy="152" r="19" fill="none" stroke="#4f46e5" stroke-width="1.4" stroke-opacity="0.28" stroke-dasharray="4 3"/>

  <!-- ======= ALERT BADGE (upper right) ======= -->
  <circle cx="416" cy="102" r="17" fill="#fef2f2" stroke="#ef4444" stroke-width="1.6" opacity="0.96"/>
  <!-- Alert exclamation -->
  <line x1="416" y1="95" x2="416" y2="106" stroke="#ef4444" stroke-width="2.4" stroke-linecap="round"/>
  <circle cx="416" cy="111" r="1.8" fill="#ef4444"/>
  <!-- Connector from output node to alert badge -->
  <line x1="406" y1="140" x2="413" y2="119" stroke="#ef4444" stroke-width="1.1" stroke-dasharray="3 2" stroke-opacity="0.55"/>

  <!-- ======= RISK SCORE BAR (bottom) ======= -->
  <rect x="270" y="228" width="148" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="270" y="228" width="96" height="10" rx="5" fill="url(#headerGrad)" opacity="0.88"/>
  <!-- Threshold marker -->
  <rect x="342" y="223" width="2" height="20" rx="1" fill="#ef4444" opacity="0.75"/>
  <!-- Indicator dot on bar -->
  <circle cx="366" cy="233" r="6.5" fill="#ef4444" opacity="0.9"/>
  <circle cx="366" cy="233" r="3" fill="white" opacity="0.85"/>

</svg>
