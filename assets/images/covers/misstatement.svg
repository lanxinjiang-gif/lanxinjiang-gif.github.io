<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="modelBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Title -->
  <text x="300" y="38" font-family="Arial, sans-serif" font-size="15" fill="#312e81" text-anchor="middle" font-weight="bold">Predicting Material Misstatements</text>
  <text x="300" y="56" font-family="Arial, sans-serif" font-size="11" fill="#6366f1" text-anchor="middle">Financial Statements → ML Classification → Flagged vs Clean</text>

  <!-- Input: Stack of financial documents (left) -->
  <rect x="42" y="108" width="100" height="125" rx="4" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1.2"/>
  <rect x="54" y="118" width="100" height="125" rx="4" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.2"/>
  <rect x="66" y="128" width="100" height="125" rx="4" fill="#ffffff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="116" y="149" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#4f46e5" text-anchor="middle">10-K Filing</text>
  <line x1="81" y1="160" x2="151" y2="160" stroke="#c7d2fe" stroke-width="1.5"/>
  <line x1="81" y1="172" x2="148" y2="172" stroke="#e0e7ff" stroke-width="1.2"/>
  <line x1="81" y1="183" x2="143" y2="183" stroke="#e0e7ff" stroke-width="1.2"/>
  <line x1="81" y1="194" x2="139" y2="194" stroke="#e0e7ff" stroke-width="1.2"/>
  <rect x="81" y="206" width="55" height="14" rx="2" fill="#dbeafe"/>
  <text x="108" y="216" font-family="Arial, sans-serif" font-size="7.5" fill="#4f46e5" text-anchor="middle">$ Figures</text>
  <rect x="140" y="206" width="20" height="14" rx="2" fill="#dbeafe"/>
  <text x="150" y="216" font-family="Arial, sans-serif" font-size="7" fill="#4f46e5" text-anchor="middle">#</text>
  <text x="116" y="280" font-family="Arial, sans-serif" font-size="10" fill="#6366f1" text-anchor="middle" font-weight="600">Financial</text>
  <text x="116" y="293" font-family="Arial, sans-serif" font-size="10" fill="#6366f1" text-anchor="middle" font-weight="600">Statements</text>

  <!-- Arrow: Documents to Model -->
  <line x1="178" y1="195" x2="228" y2="195" stroke="#6366f1" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="228,190 240,195 228,200" fill="#6366f1"/>

  <!-- ML Classification Model Box (center) -->
  <rect x="245" y="120" width="120" height="145" rx="12" fill="url(#modelBox)"/>
  <!-- Brain/network icon -->
  <circle cx="305" cy="165" r="20" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.25"/>
  <!-- Network nodes -->
  <circle cx="290" cy="152" r="4" fill="#93c5fd" opacity="0.8"/>
  <circle cx="320" cy="152" r="4" fill="#93c5fd" opacity="0.8"/>
  <circle cx="305" cy="140" r="4" fill="#dbeafe" opacity="0.8"/>
  <circle cx="290" cy="178" r="4" fill="#93c5fd" opacity="0.8"/>
  <circle cx="320" cy="178" r="4" fill="#93c5fd" opacity="0.8"/>
  <circle cx="305" cy="190" r="4" fill="#dbeafe" opacity="0.8"/>
  <!-- Connections -->
  <line x1="293" y1="154" x2="317" y2="176" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="317" y1="154" x2="293" y2="176" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="305" y1="144" x2="290" y2="152" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="305" y1="144" x2="320" y2="152" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="305" y1="186" x2="290" y2="178" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="305" y1="186" x2="320" y2="178" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <!-- Binary output indicators -->
  <text x="305" y="218" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">ML Classifier</text>
  <text x="305" y="235" font-family="monospace" font-size="9" fill="#93c5fd" text-anchor="middle">0 | 1</text>
  <text x="305" y="250" font-family="Arial, sans-serif" font-size="8" fill="#c7d2fe" text-anchor="middle">predict</text>
  <text x="305" y="290" font-family="Arial, sans-serif" font-size="10" fill="#6366f1" text-anchor="middle" font-weight="600">Classification</text>
  <text x="305" y="303" font-family="Arial, sans-serif" font-size="10" fill="#6366f1" text-anchor="middle" font-weight="600">Model</text>

  <!-- Arrows: Model to Outputs -->
  <line x1="368" y1="168" x2="418" y2="138" stroke="#6366f1" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="416,132 428,135 418,144" fill="#6366f1"/>
  <line x1="368" y1="220" x2="418" y2="250" stroke="#6366f1" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="418,244 428,253 416,256" fill="#6366f1"/>

  <!-- Output Top: Flagged (warning) -->
  <rect x="430" y="85" width="140" height="100" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="500,100 512,122 488,122" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="500" y="119" font-family="Arial, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle" font-weight="bold">!</text>
  <!-- Mini flagged docs -->
  <rect x="448" y="132" width="32" height="28" rx="2" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <line x1="453" y1="142" x2="475" y2="142" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="453" y1="149" x2="472" y2="149" stroke="#fde68a" stroke-width="1"/>
  <rect x="518" y="132" width="32" height="28" rx="2" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <line x1="523" y1="142" x2="545" y2="142" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="523" y1="149" x2="542" y2="149" stroke="#fde68a" stroke-width="1"/>
  <text x="500" y="176" font-family="Arial, sans-serif" font-size="10" fill="#d97706" text-anchor="middle" font-weight="bold">FLAGGED</text>

  <!-- Output Bottom: Clean (verified) -->
  <rect x="430" y="215" width="140" height="100" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <circle cx="500" cy="237" r="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <polyline points="493,237 498,243 508,232" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Mini clean docs -->
  <rect x="443" y="255" width="30" height="26" rx="2" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <line x1="448" y1="264" x2="468" y2="264" stroke="#86efac" stroke-width="1.5"/>
  <line x1="448" y1="271" x2="465" y2="271" stroke="#bbf7d0" stroke-width="1"/>
  <rect x="485" y="255" width="30" height="26" rx="2" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <line x1="490" y1="264" x2="510" y2="264" stroke="#86efac" stroke-width="1.5"/>
  <line x1="490" y1="271" x2="507" y2="271" stroke="#bbf7d0" stroke-width="1"/>
  <rect x="527" y="255" width="30" height="26" rx="2" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <line x1="532" y1="264" x2="552" y2="264" stroke="#86efac" stroke-width="1.5"/>
  <line x1="532" y1="271" x2="549" y2="271" stroke="#bbf7d0" stroke-width="1"/>
  <text x="500" y="296" font-family="Arial, sans-serif" font-size="10" fill="#16a34a" text-anchor="middle" font-weight="bold">CLEAN</text>

  <!-- Decorative dots -->
  <circle cx="18" cy="385" r="3" fill="#dbeafe" opacity="0.5"/>
  <circle cx="32" cy="390" r="2" fill="#dbeafe" opacity="0.3"/>
  <circle cx="572" cy="18" r="3" fill="#dbeafe" opacity="0.5"/>
  <circle cx="585" cy="12" r="2" fill="#dbeafe" opacity="0.3"/>
</svg>