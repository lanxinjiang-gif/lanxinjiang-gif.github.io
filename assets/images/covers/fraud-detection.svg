<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f8faff"/>
    </linearGradient>
    <linearGradient id="indigo2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="shadow2" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4f46e5" flood-opacity="0.12"/>
    </filter>
    <filter id="glow2" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="chartClip">
      <rect x="45" y="50" width="250" height="160"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg2)" rx="12"/>

  <!-- Decorative -->
  <circle cx="580" cy="30" r="60" fill="#6366f1" opacity="0.04"/>
  <circle cx="20" cy="380" r="70" fill="#6366f1" opacity="0.04"/>

  <!-- Main dashboard panel -->
  <g filter="url(#shadow2)">
    <rect x="30" y="35" width="280" height="200" rx="12" fill="url(#card)" stroke="#e0e7ff" stroke-width="1"/>
  </g>

  <!-- Dashboard header bar -->
  <rect x="30" y="35" width="280" height="32" rx="12" fill="url(#indigo2)"/>
  <rect x="30" y="55" width="280" height="12" fill="#4f46e5"/>
  <!-- Dots on header -->
  <circle cx="50" cy="51" r="4" fill="#fff" opacity="0.5"/>
  <circle cx="62" cy="51" r="4" fill="#fff" opacity="0.5"/>
  <circle cx="74" cy="51" r="4" fill="#fff" opacity="0.5"/>

  <!-- Line chart -->
  <g clip-path="url(#chartClip)">
    <polyline points="55,180 85,170 115,175 145,140 175,155 205,120 225,130 255,95 275,80"
              fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Area under line -->
    <polygon points="55,180 85,170 115,175 145,140 175,155 205,120 225,130 255,95 275,80 275,210 55,210"
             fill="#6366f1" opacity="0.08"/>
    <!-- Anomaly spike -->
    <polyline points="225,130 240,75 255,95"
              fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Chart grid lines -->
  <g stroke="#e0e7ff" stroke-width="0.5">
    <line x1="50" y1="100" x2="290" y2="100"/>
    <line x1="50" y1="140" x2="290" y2="140"/>
    <line x1="50" y1="180" x2="290" y2="180"/>
  </g>

  <!-- Anomaly alert dot -->
  <circle cx="240" cy="75" r="6" fill="#f59e0b" filter="url(#glow2)"/>
  <circle cx="240" cy="75" r="10" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <circle cx="240" cy="75" r="16" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.2"/>

  <!-- Side panel - bar chart -->
  <g filter="url(#shadow2)">
    <rect x="325" y="35" width="245" height="130" rx="12" fill="url(#card)" stroke="#e0e7ff" stroke-width="1"/>
  </g>
  <!-- Mini bars -->
  <rect x="350" y="105" width="22" height="40" rx="4" fill="#c7d2fe"/>
  <rect x="380" y="90" width="22" height="55" rx="4" fill="#c7d2fe"/>
  <rect x="410" y="75" width="22" height="70" rx="4" fill="#6366f1"/>
  <rect x="440" y="95" width="22" height="50" rx="4" fill="#c7d2fe"/>
  <rect x="470" y="60" width="22" height="85" rx="4" fill="#f59e0b"/>
  <rect x="500" y="85" width="22" height="60" rx="4" fill="#c7d2fe"/>
  <rect x="530" y="100" width="22" height="45" rx="4" fill="#c7d2fe"/>

  <!-- Magnifying glass -->
  <g transform="translate(400, 280)" filter="url(#shadow2)">
    <circle cx="0" cy="0" r="45" fill="white" stroke="#4f46e5" stroke-width="4" opacity="0.95"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#c7d2fe" stroke-width="1.5"/>
    <!-- Handle -->
    <line x1="32" y1="32" x2="60" y2="60" stroke="#4f46e5" stroke-width="6" stroke-linecap="round"/>
    <!-- Mini chart inside magnifying glass -->
    <polyline points="-20,8 -10,0 0,5 10,-12 20,-5" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
    <circle cx="10" cy="-12" r="3" fill="#f59e0b"/>
  </g>

  <!-- Alert signals / badges -->
  <g transform="translate(160, 290)" filter="url(#glow2)">
    <rect x="-40" y="-18" width="80" height="36" rx="18" fill="url(#amber)"/>
    <!-- Bell icon -->
    <path d="M-8,-8 C-8,-14 8,-14 8,-8 L8,0 C8,4 10,6 12,8 L-12,8 C-10,6 -8,4 -8,0 Z" fill="#fff"/>
    <circle cx="0" cy="11" r="3" fill="#fff"/>
  </g>

  <!-- Small status cards bottom left -->
  <g filter="url(#shadow2)">
    <rect x="30" y="260" width="90" height="60" rx="8" fill="url(#card)" stroke="#e0e7ff" stroke-width="1"/>
    <circle cx="55" cy="283" r="8" fill="#10b981"/>
    <rect x="70" y="279" width="35" height="6" rx="3" fill="#c7d2fe"/>
    <rect x="48" y="300" width="55" height="5" rx="2.5" fill="#e0e7ff"/>
  </g>

  <g filter="url(#shadow2)">
    <rect x="30" y="330" width="90" height="60" rx="8" fill="url(#card)" stroke="#e0e7ff" stroke-width="1"/>
    <circle cx="55" cy="353" r="8" fill="#f59e0b"/>
    <rect x="70" y="349" width="35" height="6" rx="3" fill="#c7d2fe"/>
    <rect x="48" y="370" width="55" height="5" rx="2.5" fill="#e0e7ff"/>
  </g>

  <!-- Second bottom panel -->
  <g filter="url(#shadow2)">
    <rect x="325" y="180" width="245" height="55" rx="10" fill="url(#card)" stroke="#e0e7ff" stroke-width="1"/>
    <!-- Progress bar -->
    <rect x="345" y="200" width="200" height="8" rx="4" fill="#e0e7ff"/>
    <rect x="345" y="200" width="140" height="8" rx="4" fill="url(#indigo2)"/>
    <circle cx="485" cy="204" r="5" fill="#f59e0b"/>
  </g>

  <!-- Floating data points -->
  <circle cx="180" cy="30" r="3" fill="#93c5fd" opacity="0.5"/>
  <circle cx="320" cy="20" r="2" fill="#6366f1" opacity="0.4"/>
  <circle cx="520" cy="370" r="3" fill="#93c5fd" opacity="0.5"/>
  <circle cx="280" cy="370" r="2" fill="#c7d2fe" opacity="0.6"/>
</svg>