<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="alertGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- Title -->
  <text x="300" y="38" font-family="Arial, sans-serif" font-size="15" fill="#312e81" text-anchor="middle" font-weight="bold">Real-Time Financial Statement Fraud Detection</text>
  <text x="300" y="56" font-family="Arial, sans-serif" font-size="11" fill="#6366f1" text-anchor="middle">Streaming Financial Data → Anomaly Detection → Real-Time Alert</text>

  <!-- Timeline base line -->
  <line x1="40" y1="230" x2="560" y2="230" stroke="#c7d2fe" stroke-width="2"/>
  <!-- Time markers -->
  <line x1="70" y1="225" x2="70" y2="235" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="70" y="250" font-family="Arial, sans-serif" font-size="8" fill="#a5b4fc" text-anchor="middle">Q1</text>
  <line x1="160" y1="225" x2="160" y2="235" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="160" y="250" font-family="Arial, sans-serif" font-size="8" fill="#a5b4fc" text-anchor="middle">Q2</text>
  <line x1="250" y1="225" x2="250" y2="235" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="250" y="250" font-family="Arial, sans-serif" font-size="8" fill="#a5b4fc" text-anchor="middle">Q3</text>
  <line x1="340" y1="225" x2="340" y2="235" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="340" y="250" font-family="Arial, sans-serif" font-size="8" fill="#a5b4fc" text-anchor="middle">Q4</text>
  <line x1="430" y1="225" x2="430" y2="235" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="430" y="250" font-family="Arial, sans-serif" font-size="8" fill="#a5b4fc" text-anchor="middle">Q5</text>
  <line x1="520" y1="225" x2="520" y2="235" stroke="#a5b4fc" stroke-width="1.5"/>
  <text x="520" y="250" font-family="Arial, sans-serif" font-size="8" fill="#a5b4fc" text-anchor="middle">Q6</text>

  <!-- Normal data stream (line chart) -->
  <polyline points="50,210 70,205 90,212 110,200 130,208 150,195 170,202 190,198 210,205 230,192 250,200 270,196 290,202 310,198" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data dots on normal range -->
  <circle cx="70" cy="205" r="3" fill="#6366f1"/>
  <circle cx="130" cy="208" r="3" fill="#6366f1"/>
  <circle cx="190" cy="198" r="3" fill="#6366f1"/>
  <circle cx="250" cy="200" r="3" fill="#6366f1"/>

  <!-- Anomaly spike area -->
  <polyline points="310,198 320,190 330,175 340,130 350,108 355,95 360,110 370,140 380,170 390,195 400,205 420,210 440,208 460,205 480,210 500,207 520,212 540,208 555,210" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Anomaly spike highlight -->
  <polyline points="320,190 330,175 340,130 350,108 355,95 360,110 370,140 380,170" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Red anomaly dots -->
  <circle cx="340" cy="130" r="4" fill="#ef4444"/>
  <circle cx="355" cy="95" r="5" fill="#ef4444"/>
  <circle cx="350" cy="108" r="4" fill="#ef4444"/>

  <!-- Anomaly zone highlight -->
  <rect x="315" y="80" width="70" height="160" rx="4" fill="#fef2f2" opacity="0.35" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Alert icon pointing to anomaly -->
  <!-- Bell/alarm -->
  <g transform="translate(355, 72)">
    <circle cx="0" cy="-18" r="16" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
    <!-- Bell shape -->
    <path d="M-7,-22 C-7,-28 7,-28 7,-22 L8,-16 C8,-14 -8,-14 -8,-16 Z" fill="#f59e0b"/>
    <rect x="-3" y="-14" width="6" height="3" rx="1.5" fill="#f59e0b"/>
    <circle cx="0" cy="-26" r="1.5" fill="#f59e0b"/>
    <!-- Exclamation -->
    <text x="0" y="-16" font-family="Arial, sans-serif" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="bold">!</text>
  </g>
  <!-- Alert label -->
  <rect x="395" y="78" width="90" height="30" rx="6" fill="#f59e0b"/>
  <text x="440" y="97" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="bold">ALERT!</text>
  <line x1="385" y1="93" x2="395" y2="93" stroke="#f59e0b" stroke-width="2"/>

  <!-- Threshold line (dashed) -->
  <line x1="40" y1="160" x2="560" y2="160" stroke="#ef4444" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="565" y="163" font-family="Arial, sans-serif" font-size="8" fill="#ef4444" text-anchor="start" opacity="0.7">threshold</text>

  <!-- Normal band -->
  <rect x="40" y="185" width="560" height="40" rx="0" fill="#dbeafe" opacity="0.15"/>
  <text x="50" y="196" font-family="Arial, sans-serif" font-size="7" fill="#93c5fd">normal range</text>

  <!-- Clock element (real-time indicator) -->
  <g transform="translate(75, 310)">
    <circle cx="0" cy="0" r="22" fill="#ffffff" stroke="#6366f1" stroke-width="2"/>
    <circle cx="0" cy="0" r="18" fill="#eef2ff"/>
    <!-- Clock hands -->
    <line x1="0" y1="0" x2="0" y2="-12" stroke="#4f46e5" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="8" y2="-4" stroke="#4f46e5" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="2" fill="#4f46e5"/>
    <!-- Hour markers -->
    <circle cx="0" cy="-15" r="1" fill="#6366f1"/>
    <circle cx="15" cy="0" r="1" fill="#6366f1"/>
    <circle cx="0" cy="15" r="1" fill="#6366f1"/>
    <circle cx="-15" cy="0" r="1" fill="#6366f1"/>
  </g>
  <text x="75" y="345" font-family="Arial, sans-serif" font-size="9" fill="#6366f1" text-anchor="middle" font-weight="600">Real-Time</text>
  <text x="75" y="357" font-family="Arial, sans-serif" font-size="9" fill="#6366f1" text-anchor="middle" font-weight="600">Monitoring</text>

  <!-- Streaming data indicator (left side) -->
  <g transform="translate(165, 305)">
    <rect x="-35" y="-15" width="70" height="30" rx="6" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
    <text x="0" y="-2" font-family="Arial, sans-serif" font-size="8" fill="#4f46e5" text-anchor="middle" font-weight="bold">STREAMING</text>
    <text x="0" y="9" font-family="Arial, sans-serif" font-size="7" fill="#6366f1" text-anchor="middle">data feed</text>
  </g>

  <!-- Fraud detected label -->
  <g transform="translate(350, 270)">
    <rect x="-50" y="-12" width="100" height="24" rx="4" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="0" y="3" font-family="Arial, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle" font-weight="bold">Anomaly Detected</text>
  </g>

  <!-- Financial data symbols scattered along the stream -->
  <text x="100" y="290" font-family="Arial, sans-serif" font-size="8" fill="#93c5fd">revenue</text>
  <text x="200" y="275" font-family="Arial, sans-serif" font-size="8" fill="#93c5fd">accruals</text>
  <text x="460" y="275" font-family="Arial, sans-serif" font-size="8" fill="#93c5fd">ratios</text>
  <text x="530" y="290" font-family="Arial, sans-serif" font-size="8" fill="#93c5fd">cash flows</text>

  <!-- Decorative -->
  <circle cx="15" cy="385" r="3" fill="#dbeafe" opacity="0.5"/>
  <circle cx="585" cy="15" r="3" fill="#dbeafe" opacity="0.5"/>
</svg>