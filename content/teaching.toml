[[items]]
title = "ACC 320 AI in Accounting and Assurance"
date = "2026 Spring"
content = "This course introduces the concepts and applications of Artificial Intelligence (AI) in accounting and auditing. Topics include Python-based data analysis, text mining, machine learning, and emerging technologies such as generative and agentic AI. Students learn how AI is used in financial reporting, auditing, and other accounting functions, with an emphasis on real-world applications and use cases. The course incorporates hands-on experience with AI tools and data, as well as instruction in prompt engineering. Ethical considerations and challenges of AI adoption in business are also examined. By the end of the course, students will be able to apply AI techniques and evaluate their impact in accounting and assurance contexts.\n\n**What Students Are Saying** *(Spring 2026)*\n\n> \"This class is honestly great for a beginner like me, since the class doesn't move fast, and we are always welcome to ask questions without hesitation. The applications are also very beginner-friendly.\"\n\n> \"I actually have built hundreds of tools in AI since using this knowledge from this course. The course has been well organized and very relevant, especially with how important AI is becoming in business.\"\n\n> \"This course is thoughtfully organized and the progression from a beginner's perspective of AI to practical application makes it easy for someone with no background knowledge in AI or computer concepts to follow along.\"\n\n> \"I really enjoyed the first lecture on how AI is used and how it cannot be replaced by humans at this time. It raised my confidence in my future and increased my interest in learning to use AI in the workplace.\""
tags = ["Undergraduate", "Business"]

[[items]]
title = "ACC 214 Managerial Cost Anlysis and Applications"
date = "2025 Fall, 2026 Fall"
content = "A study of cost concepts, and theories and the implementation and evaluation of an accounting system as a source of information for decision making, planning, control, and evaluation of the organization by management. Other topics includes cost-volume-profit analysis, budgeting and variance analysis. The overall course objective is to familiarize students with cost accounting concepts and how to make business decisions using accounting information, while incorporating Excel modeling and data visualization to enhance students' analytical and decision-support skills. The course is designed for both accounting and non-accounting business majors.\n\n**What Students Are Saying** *(Fall 2025)*\n\n> \"She is truly amazing and caring and is willing to do anything to make the class simpler.\"\n\n> \"I appreciate the effort the professor puts into explaining each topic clearly and connecting theory to real-world examples.\"\n\n> \"My understanding has shifted from memorizing formulas to grasping the strategic 'why' behind cost accounting.\"\n\n> \"This semester, I have become much more confident in my understanding of cost accounting and in my ability to apply the material. I feel prepared to carry the skills from this course into future classes and professional settings.\"\n\n> \"I've slowly learned to trace the logic behind each method and truly connect it to the problems instead of just memorizing steps.\"\n\n> \"The course feels manageable and well-organized.\""
tags = ["Undergraduate", "Business"]

[[items]]
title = "22:010:684 Intro to A.I."
date = "2022 Spring, 2023 Spring"
content = "AI is a technology that mimics human intelligence. In the era of big data and digitization, accounting professionals are supposed to have a better understanding of AI technologies in business and their work. The overall course objective is to familiarize students with the concepts of AI and the way in which AI adds value to business, accounting, and auditing. In this context, AI refers to the technologies employed in enterprise accounting in the broadest sense, including Machine Learning (ML), Natural Language Processing (NLP), and Robotic Process Automation (RPA). This course introduces the concepts and applications of AI in modern organizations from the perspective of accounting and auditing. To illustrate the underlying logic and realization of AI in accounting and auditing, this course also provides an introduction to AI tools and demonstrations of how to use them to analyze real-world data. Students will gain hands-on experience with AI software for accounting and auditing."
tags = ["Graduate", "Accounting"]